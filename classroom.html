<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 교실 - 학생용</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS는 PM 스타일 유지하되 교실 레이아웃 추가 */
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); }
        :root { --pm-dark: #3e2723; --pm-gold: #c5a059; --pm-bg: #fdf5e6; }
        body { margin: 0; background: #222; font-family: 'DungGeunMo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .pm-window { width: 1024px; height: 750px; background: var(--pm-bg); border: 12px ridge var(--pm-dark); outline: 4px solid var(--pm-gold); display: flex; flex-direction: column; }
        .classroom-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; padding: 20px; flex: 1; background: #ead7b1; border: 5px inset #3e2723; margin: 10px; }
        .desk { background: #3e2723; border: 3px solid var(--pm-gold); height: 80px; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; transition: 0.2s; }
        .desk.online { background: #fff9eb; color: #333; box-shadow: 0 0 10px gold; }
        .bottom-bar { background: var(--pm-dark); padding: 10px; display: flex; gap: 10px; justify-content: center; }
        .pm-btn { background: var(--pm-dark); color: var(--pm-gold); border: 4px outset var(--pm-gold); padding: 8px 20px; cursor: pointer; font-family: inherit; }
        /* 팝업 스타일 동일 */
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:200; justify-content:center; align-items:center; }
        .popup { background: var(--pm-bg); border: 8px ridge var(--pm-dark); padding: 20px; width: 500px; }
    </style>
</head>
<body>

<div class="pm-window">
    <div class="pm-header" id="classHeader">6-5 CLASSROOM (Student View)</div>
    <div class="classroom-grid" id="deskGrid"></div>
    <div class="bottom-bar">
        <button class="pm-btn" onclick="openModal('questBoard')">📜 퀘스트 게시판</button>
        <button class="pm-btn" onclick="openModal('myInventory')">🎒 내 퀘스트 보관함</button>
        <button class="pm-btn" style="background:#888;" onclick="location.href='index.html'">🔙 연금술소로</button>
    </div>
</div>

<div id="studentDetail" class="modal"><div class="popup" style="width:600px;">
    <h2 id="detName" style="text-align:center;">학생 정보</h2>
    <div style="display:flex; gap:10px;">
        <div style="width:200px; height:200px; background:white; border:2px inset #ccc;"><canvas id="radarChart"></canvas></div>
        <div style="flex:1;">
            <h4>💎 보유 미덕 보석: <span id="detGems">0</span>개</h4>
            <h4>🎯 진행 중인 퀘스트</h4>
            <div id="detQuests" style="font-size:14px; background:white; padding:10px; height:100px; overflow-y:auto; border:2px inset #ccc;"></div>
        </div>
    </div>
    <button class="pm-btn" style="width:100%; margin-top:15px;" onclick="closeModal('studentDetail')">닫기</button>
</div></div>

<div id="questBoard" class="modal"><div class="popup">
    <h3>📜 전체 퀘스트 게시판</h3>
    <div id="globalQuestList" style="min-height:200px; background:white; border:2px inset #ccc; padding:10px;"></div>
    <button class="pm-btn" style="width:100%; margin-top:10px;" onclick="closeModal('questBoard')">닫기</button>
</div></div>

<div id="myInventory" class="modal"><div class="popup">
    <h3>🎒 나의 퀘스트 수령 목록</h3>
    <div id="myList" style="min-height:200px; background:white; border:2px inset #ccc; padding:10px;"></div>
    <button class="pm-btn" style="width:100%; margin-top:10px;" onclick="closeModal('myInventory')">닫기</button>
</div></div>

<script>
    // Firebase 설정 동일
    const db = firebase.database();
    const urlParams = new URLSearchParams(window.location.search);
    const myNum = urlParams.get('num');

    // 책상 23개 생성
    for(let i=1; i<=23; i++) {
        let d = document.createElement('div'); d.className='desk'; d.id=`desk-${i}`;
        d.innerHTML = i + "번";
        d.onclick = () => showDetail(i);
        document.getElementById('deskGrid').appendChild(d);
    }

    // 실시간 교실 업데이트
    db.ref('room/').on('value', snap => {
        const data = snap.val();
        Object.values(data).forEach(s => {
            const desk = document.getElementById(`desk-${s.num}`);
            if(desk && s.status === "online") desk.classList.add('online');
        });
    });

    // 퀘스트 게시판 (선생님이 보낸 퀘스트 확인)
    db.ref('globalQuests').on('value', snap => {
        const list = document.getElementById('globalQuestList');
        list.innerHTML = "";
        snap.forEach(child => {
            let q = child.val();
            let d = document.createElement('div'); d.style.padding="10px"; d.style.borderBottom="1px solid #eee";
            d.innerHTML = `[인성] ${q.title} <button class="pm-btn" style="float:right; font-size:10px;" onclick="acceptQuest('${q.title}')">수령</button>`;
            list.appendChild(d);
        });
    });

    function acceptQuest(title) {
        db.ref(`room/student${myNum}/quests`).push({ title: title, status: 'doing' });
        alert("퀘스트를 수령했습니다! 보관함에서 확인하세요.");
    }

    // 내 보관함 실시간 연동
    db.ref(`room/student${myNum}/quests`).on('value', snap => {
        const list = document.getElementById('myList');
        list.innerHTML = "";
        snap.forEach(child => {
            const q = child.val();
            let d = document.createElement('div'); d.style.padding="10px";
            d.innerHTML = `🎯 ${q.title} <button class="pm-btn" style="float:right; font-size:10px;" onclick="requestDone('${child.key}', '${q.title}')">다했어요!</button>`;
            list.appendChild(d);
        });
    });

    function requestDone(key, title) {
        db.ref(`room/student${myNum}/requestDone`).set({ key: key, title: title });
        alert("선생님께 완료 승인을 요청했습니다.");
    }

    function showDetail(num) {
        db.ref(`room/student${num}`).once('value', snap => {
            if(!snap.exists()) { alert("아직 입장하지 않은 학생입니다."); return; }
            const s = snap.val();
            document.getElementById('detName').innerText = `${s.num}번 ${s.name}의 상태`;
            document.getElementById('detGems').innerText = s.gems || 0;
            const qList = document.getElementById('detQuests');
            qList.innerHTML = "";
            if(s.quests) Object.values(s.quests).forEach(q => qList.innerHTML += `<div>· ${q.title}</div>`);
            
            openModal('studentDetail');
            initChart(); // 육각형 차트 로드
        });
    }

    function initChart() {
        
        const ctx = document.getElementById('radarChart');
        new Chart(ctx, { type:'radar', data:{ labels:['자아','조절','관계','의욕','회복','친절'], datasets:[{data:[50,50,50,50,50,50], borderColor:'gold'}] }, options:{plugins:{legend:{display:false}}, scales:{r:{min:0,max:100,ticks:{display:false}}}} });
    }

    function openModal(id) { document.getElementById(id).style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
</script>
</body>
</html>
