<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 교실</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
<div class="window">
    <div class="header">🏫 6학년 5반 교실 (좌석 현황)</div>
    <div class="classroom-main">
        <div class="seat-area" id="seatGrid"></div>
        <div class="menu-area">
            <button class="pm-btn" onclick="location.href='index.html'">📋 내 감정 카드 보러가기</button>
            <div class="frame" style="background:#fff; border:3px solid var(--pm-dark); padding:10px; flex:1;">
                <h4 style="margin:0 0 10px 0;">📜 진행 중인 퀘스트</h4>
                <div id="myQuestDisp" style="font-size:14px; color:#c00; font-weight:bold;"></div>
                <button class="pm-btn" style="margin-top:10px; font-size:12px;" onclick="reportQuest()">완료 보고하기</button>
            </div>
            <div class="frame" style="background:#fff; border:3px solid var(--pm-dark); padding:10px;">
                <h4 style="margin:0 0 5px 0;">💎 미덕 보석함</h4>
                <div id="myGems" style="font-size:13px;"></div>
            </div>
            <button class="pm-btn" style="background:#888;">📢 퀘스트 게시판</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8", authDomain: "secret-quest-class.firebaseapp.com", databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/", projectId: "secret-quest-class", storageBucket: "secret-quest-class.firebasestorage.app", messagingSenderId: "397245266210", appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    const myNum = new URLSearchParams(window.location.search).get('num') || "1";

    // 좌석 생성
    const grid = document.getElementById('seatGrid');
    for(let i=1; i<=23; i++) { grid.innerHTML += `<div class="desk" id="d${i}">${i}</div>`; }

    db.ref('room/').on('value', snap => {
        snap.forEach(c => {
            const s = c.val(); const d = document.getElementById(`d${s.num}`);
            if(d && s.status==='online') {
                d.className = 'desk online';
                d.innerHTML = `<img src="${s.emojiImg}" width="20"><br>${s.num}번`;
            }
        });
        const me = snap.val()[`student${myNum}`];
        if(me) {
            document.getElementById('myQuestDisp').innerText = me.quest || "선택된 퀘스트 없음";
            document.getElementById('myGems').innerHTML = `배려:${me.gems.배려} 존중:${me.gems.존중} 사랑:${me.gems.사랑}`;
        }
    });

    function reportQuest() {
        db.ref(`room/student${myNum}/requestDone`).set(true);
        alert("선생님께 완료 보고를 보냈습니다!");
    }
</script>
</body>
</html>
