<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6학년 5반 교실 현황</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="game-window">
    <div class="window-header"><span>🏫 6학년 5반 실시간 교실 현황</span></div>
    <div class="classroom-grid" id="floor"></div>
    <p style="text-align:center; font-size:12px; color:#666; margin-top:10px;">* 활성화된 책상을 클릭하면 학생의 감정 보고서를 확인합니다.</p>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
        authDomain: "secret-quest-class.firebaseapp.com",
        databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/",
        projectId: "secret-quest-class",
        storageBucket: "secret-quest-class.firebasestorage.app",
        messagingSenderId: "397245266210",
        appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 책상 23개 생성
    const floor = document.getElementById('floor');
    for(let i=1; i<=23; i++) {
        const d = document.createElement('div');
        d.className = 'desk'; d.id = `desk-${i}`;
        d.innerHTML = `<span>${i}번</span><span>빈자리</span>`;
        floor.appendChild(d);
    }

    // 실시간 데이터 감시
    database.ref('room/').on('value', (snap) => {
        const data = snap.val();
        if(!data) return;
        for(let key in data) {
            const s = data[key];
            const desk = document.getElementById(`desk-${s.num}`);
            if(desk) {
                desk.className = "desk online";
                desk.innerHTML = `<span>${s.emoji}</span><span>${s.name}</span>`;
                desk.onclick = () => {
                    alert(`[${s.name} 감정 리포트]\n\n기록: ${s.diary}\n의욕: ${s.stats.en}%\n안정: ${s.stats.re}%\n감성: ${s.stats.se}%`);
                };
            }
        }
    });
</script>
</body>
</html>
