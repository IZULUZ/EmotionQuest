<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6학년 5반 관리자</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="game-window">
    <div class="window-header"><span>🏫 6학년 5반 실시간 감정 지도</span></div>
    <div class="classroom-grid" id="floor"></div>
</div>

<div id="popOverlay" class="modal-overlay">
    <div class="custom-popup">
        <h2 id="popTitle" style="margin-top:0; color:var(--gold);">학생 정보</h2>
        <div id="popBody" style="line-height:1.6; font-size:18px;"></div>
        <button class="pixel-btn" style="margin-top:20px; width:100%;" onclick="closePop()">확인 완료</button>
    </div>
</div>

<script>
    const firebaseConfig = { /* 위와 동일한 설정 복사 */
        apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
        authDomain: "secret-quest-class.firebaseapp.com",
        databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/",
        projectId: "secret-quest-class",
        storageBucket: "secret-quest-class.firebasestorage.app",
        messagingSenderId: "397245266210",
        appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    for(let i=1; i<=23; i++) {
        const d = document.createElement('div');
        d.className = 'desk'; d.id = `desk-${i}`;
        d.innerHTML = `<span>${i}번</span>`;
        document.getElementById('floor').appendChild(d);
    }

    database.ref('room/').on('value', (snap) => {
        const data = snap.val();
        if(!data) return;
        for(let key in data) {
            const s = data[key];
            const desk = document.getElementById(`desk-${s.num}`);
            if(desk) {
                desk.className = "desk online";
                desk.innerHTML = `<span>${s.emoji}</span><span>${s.name}</span>`;
                desk.onclick = () => openPop(s);
            }
        }
    });

    function openPop(s) {
        document.getElementById('popOverlay').style.display = 'flex';
        document.getElementById('popTitle').innerText = `${s.name}의 감정 보고서`;
        document.getElementById('popBody').innerHTML = `
            <div style="font-size:40px; margin-bottom:10px;">${s.emoji}</div>
            <strong>이유:</strong> ${s.diary}<br>
            <strong>선택 퀘스트:</strong> <span style="color:blue;">${s.quest}</span>
        `;
    }
    function closePop() { document.getElementById('popOverlay').style.display = 'none'; }
</script>
</body>
</html>
