<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 교실</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); }
        body { margin:0; background:#1a1a1a; font-family:'DungGeunMo'; color:white; overflow:hidden; }
        .desk-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; padding:15px; height: 80vh; overflow-y:auto; }
        .desk { background:#2d1b15; border:2px solid #444; height:120px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#555; }
        .desk.online { background:#fff; border:3px solid gold; color:#000; box-shadow: 0 0 15px rgba(255,215,0,0.3); }
        .nav-bar { position:fixed; bottom:0; width:100%; height:80px; background:#222; border-top:4px solid gold; display:flex; justify-content:space-around; align-items:center; }
        .nav-btn { background:var(--pm-dark); color:gold; border:2px solid gold; padding:10px 15px; cursor:pointer; font-family:inherit; font-size:16px; }
        .popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#fdf5e6; border:8px ridge #3e2723; width:400px; padding:20px; color:#333; z-index:1000; }
        .item { border-bottom:1px solid #ccc; padding:10px; display:flex; justify-content:space-between; align-items:center; }
        .gem-img { width:40px; height:40px; object-fit: contain; }
        /* 보석 이펙트 애니메이션 */
        @keyframes gem-fall { 0% { transform: translateY(-100px) rotate(0); opacity:1; } 100% { transform: translateY(100vh) rotate(360deg); opacity:0; } }
        .effect-gem { position:fixed; z-index:9999; pointer-events:none; font-size:40px; animation: gem-fall 2s linear forwards; }
    </style>
</head>
<body>
<div class="desk-grid" id="grid"></div>
<div class="nav-bar">
    <button class="nav-btn" onclick="togglePop('popMy')">🎒 내 퀘스트</button>
    <button class="nav-btn" onclick="togglePop('popBoard')">📜 게시판</button>
    <button class="nav-btn" onclick="togglePop('popGem')">💎 미덕보석</button>
</div>

<div id="popMy" class="popup"><h3>🎒 내 퀘스트 (최대 3개)</h3><div id="myList"></div><button class="nav-btn" onclick="togglePop('popMy')" style="width:100%; margin-top:10px;">닫기</button></div>
<div id="popBoard" class="popup"><h3>📜 전체 퀘스트 게시판</h3><div id="boardList"></div><button class="nav-btn" onclick="togglePop('popBoard')" style="width:100%; margin-top:10px;">닫기</button></div>
<div id="popGem" class="popup" style="text-align:center;">
    <h3>💎 수집한 미덕 보석</h3>
    <div style="display:flex; justify-content:space-around;">
        <div><img src="https://img.icons8.com/external-flat-icons-inmotus-design/64/external-Gem-gemology-flat-icons-inmotus-design-12.png" class="gem-img"><br>존중<br><span id="g-respect">0</span></div>
        <div><img src="https://img.icons8.com/external-flat-icons-inmotus-design/64/external-Gem-gemology-flat-icons-inmotus-design-2.png" class="gem-img"><br>배려<br><span id="g-care">0</span></div>
        <div><img src="https://img.icons8.com/external-flat-icons-inmotus-design/64/external-Gem-gemology-flat-icons-inmotus-design-8.png" class="gem-img"><br>사랑<br><span id="g-love">0</span></div>
    </div>
    <button class="nav-btn" onclick="togglePop('popGem')" style="width:100%; margin-top:15px;">닫기</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8", authDomain: "secret-quest-class.firebaseapp.com", databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/", projectId: "secret-quest-class", storageBucket: "secret-quest-class.firebasestorage.app", messagingSenderId: "397245266210", appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();
    const myNum = new URLSearchParams(window.location.search).get('num') || "1";

    // 1. 교실 책상 및 실시간 데이터
    const grid = document.getElementById('grid');
    for(let i=1; i<=23; i++) {
        let d = document.createElement('div'); d.className='desk'; d.id=`desk-${i}`; d.innerText=i; grid.appendChild(d);
    }
    db.ref('room/').on('value', snap => {
        snap.forEach(c => {
            const s = c.val(); const d = document.getElementById(`desk-${s.num}`);
            if(d && s.status==='online') {
                d.className='desk online';
                d.innerHTML=`<img src="https://models.readyplayer.me/65829873d328479590892b1a.png?camera=fullbody&gender=${s.gender}&seed=${s.num}" style="height:70px;"><br>${s.num}번`;
            }
        });
        const me = snap.val()[`student${myNum}`];
        if(me) {
            document.getElementById('g-respect').innerText = me.gems?.respect || 0;
            document.getElementById('g-care').innerText = me.gems?.care || 0;
            document.getElementById('g-love').innerText = me.gems?.love || 0;
        }
    });

    // 2. 퀘스트 게시판 리스트
    db.ref('globalQuests').on('value', snap => {
        const list = document.getElementById('boardList'); list.innerHTML="";
        snap.forEach(c => {
            const q = c.val();
            let d = document.createElement('div'); d.className='item';
            d.innerHTML = `<span>${q.title}</span><button onclick="takeQuest('${c.key}', ${JSON.stringify(q).replace(/"/g, '&quot;')})">수령</button>`;
            list.appendChild(d);
        });
    });

    // 3. 내 퀘스트 리스트
    db.ref(`room/student${myNum}/myQuests`).on('value', snap => {
        const list = document.getElementById('myList'); list.innerHTML="";
        snap.forEach(c => {
            const q = c.val();
            let d = document.createElement('div'); d.className='item';
            d.innerHTML = `<span>${q.title}</span><button onclick="reportDone('${c.key}', '${q.title}')">다했어요</button>`;
            list.appendChild(d);
        });
    });

    function takeQuest(key, data) {
        db.ref(`room/student${myNum}/myQuests`).once('value', s => {
            if(s.numChildren() >= 3) return alert("이미 3개의 퀘스트를 가지고 있습니다.");
            db.ref(`room/student${myNum}/myQuests`).push(data);
            alert("퀘스트를 수령했습니다!");
        });
    }

    function reportDone(key, title) {
        db.ref(`room/student${myNum}/requestDone`).set({ key, title });
        alert("선생님께 완료 신호를 보냈습니다!");
    }

    // 4. 보석 획득 특수효과 감지
    db.ref(`room/student${myNum}/recentReward`).on('value', snap => {
        if(!snap.exists()) return;
        const r = snap.val();
        for(let i=0; i<30; i++) {
            const gem = document.createElement('div'); gem.className='effect-gem'; gem.innerText='💎';
            gem.style.left = Math.random() * 100 + 'vw'; gem.style.animationDelay = Math.random() * 1 + 's';
            document.body.appendChild(gem);
            setTimeout(() => gem.remove(), 3000);
        }
        alert(`✨ 축하합니다! ${r.type} 보석 ${r.amount}개를 획득했습니다! ✨`);
        db.ref(`room/student${myNum}/recentReward`).remove();
    });

    function togglePop(id) { 
        const p = document.getElementById(id); 
        p.style.display = (p.style.display === 'block') ? 'none' : 'block'; 
    }
</script>
</body>
</html>
