<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 교실 통합 관리국 - 교사용</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        .desk-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; flex: 1; }
        .desk { background: #3e2723; border: 2px solid var(--pm-gold); padding: 10px; color: white; text-align: center; cursor: pointer; position: relative; }
        .desk.active { background: #fff9eb; color: #333; box-shadow: 0 0 15px var(--pm-gold); }
        .desk.request { border: 4px solid #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="pm-window">
    <div class="pm-header">6-5 EMOTION MANAGEMENT CENTER (Teacher Mode)</div>
    <div class="pm-container">
        <div class="desk-grid" id="deskGrid"></div>
        
        <div class="pm-side" style="width:280px;">
            <h3 style="margin-top:0;">📢 퀘스트 발급</h3>
            <textarea id="qInput" style="width:100%; height:80px; font-family:inherit;" placeholder="공통 미션 내용..."></textarea>
            <button class="pm-btn" style="width:100%; margin-top:5px;" onclick="issueQuest()">미션 게시하기</button>
            <hr style="width:100%; border:1px double var(--pm-gold); margin:15px 0;">
            <h3>💎 보상 통계</h3>
            <div id="statLog" style="font-size:12px; height:200px; overflow-y:auto; background:white; padding:5px; border:2px inset #ccc;"></div>
            <button class="pm-btn" style="width:100%; margin-top:auto;" onclick="location.href='index.html'">학생 모드로 전환</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { /* 위와 동일한 Firebase 키 */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 교사 확인
    let pw = prompt("관리자 암호를 입력하세요", "");
    if(pw !== "6500") { alert("접근 권한이 없습니다."); location.href='index.html'; }

    // 책상 생성
    const grid = document.getElementById('deskGrid');
    for(let i=1; i<=23; i++) {
        let d = document.createElement('div'); d.className='desk'; d.id=`desk-${i}`;
        d.innerHTML = `${i}번<br>부재중`; grid.appendChild(d);
    }

    // 실시간 감시
    db.ref('room/').on('value', snap => {
        const data = snap.val();
        if(!data) return;
        Object.values(data).forEach(s => {
            const desk = document.getElementById(`desk-${s.num}`);
            if(desk) {
                desk.className = 'desk active' + (s.questStatus === 'request' ? ' request' : '');
                desk.innerHTML = `<b>${s.name}</b><br>${s.emoji}<br><span style="font-size:10px; color:#c5a059;">💎 x ${s.gems || 0}</span>`;
                desk.onclick = () => openStudentDetail(s);
            }
        });
    });

    function openStudentDetail(s) {
        if(s.questStatus === 'request') {
            if(confirm(`${s.name} 학생이 퀘스트를 완료했습니다. 승인하고 보석을 줄까요?`)) {
                db.ref(`room/student${s.num}`).update({
                    questStatus: 'complete',
                    gems: (s.gems || 0) + 1,
                    quest: "새로운 퀘스트를 기다리는 중..."
                });
            }
        } else {
            alert(`[${s.name}의 성찰]\n${s.diary}`);
        }
    }

    function issueQuest() {
        const q = document.getElementById('qInput').value;
        if(q) {
            db.ref('globalQuests').push(q);
            alert("퀘스트가 모든 학생의 게시판에 전송되었습니다.");
            document.getElementById('qInput').value = "";
        }
    }
</script>
</body>
</html>
