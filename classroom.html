<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 교실</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        .class-layout { display: flex; padding: 25px; gap: 25px; height: 100%; box-sizing: border-box; }
        .seat-section { flex: 2; background: #3a2218; border: 6px inset var(--pm-gold); padding: 15px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .btn-section { flex: 0.8; display: flex; flex-direction: column; gap: 15px; }
        .desk { background: #4e342e; color: #8a6d3b; border: 2px solid #2d1b15; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; }
        .desk.on { background: white; color: black; border-color: var(--pm-gold); font-weight: bold; }
    </style>
</head>
<body>
<div class="window">
    <div class="header">
        <span>🏫 6-5 교실 (좌석 현황)</span>
        <button class="pm-btn" style="font-size:12px;" onclick="location.href='index.html'">내 감정 카드</button>
    </div>
    <div class="class-layout">
        <div class="seat-section" id="seatGrid"></div>
        <div class="btn-section">
            <button class="pm-btn" onclick="alert('오늘의 퀘스트: ' + myQ)">📜 퀘스트 목록</button>
            <button class="pm-btn" onclick="alert('게시판 준비중')">📢 퀘스트 게시판</button>
            <button class="pm-btn" onclick="alert('보석함: ' + myGems)">💎 미덕 보석함</button>
            <hr>
            <div id="questStatus" style="background:white; border:2px solid var(--pm-gold); padding:10px; font-size:14px; flex:1;">
                <strong>현재 미션:</strong><br><span id="qText"></span><br><br>
                <button class="pm-btn" style="width:100%;" onclick="reportDone()">다 했어요!</button>
            </div>
        </div>
    </div>
</div>
<script>
    const sNum = new URLSearchParams(window.location.search).get('num') || "1";
    let myQ = ""; let myGems = "";
    const grid = document.getElementById('seatGrid');
    for(let i=1; i<=23; i++) grid.innerHTML += `<div class="desk" id="d${i}">${i}</div>`;

    db.ref(`room/student${sNum}`).on('value', snap => {
        const d = snap.val();
        if(d) {
            myQ = d.quest; document.getElementById('qText').innerText = d.quest;
            myGems = `배려:${d.gems.배려}, 존중:${d.gems.존중}, 사랑:${d.gems.사랑}`;
        }
    });

    db.ref('room/').on('value', snap => {
        snap.forEach(c => {
            const s = c.val(); if(s.status==='online') {
                const desk = document.getElementById(`d${s.num}`);
                desk.className = 'desk on'; desk.innerHTML = `<img src="${s.emojiImg}" width="30"><br>${s.num}번`;
            }
        });
    });

    function reportDone() { db.ref(`room/student${sNum}`).update({reqDone: true}); alert("보고 완료!"); }
</script>
</body>
</html>
