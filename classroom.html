<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 교실</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        .classroom-window { display: flex; flex-direction: row; padding: 20px; gap: 20px; height: 100%; box-sizing: border-box; }
        /* 좌측: 좌석 현황 */
        .left-area { flex: 2; background: #4e342e; border: 6px inset var(--pm-dark); padding: 15px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; overflow-y: auto; }
        /* 우측: 메뉴 및 정보 */
        .right-area { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .info-panel { background: white; border: 4px ridge var(--pm-gold); padding: 15px; flex: 1; }
        .gem-box { background: var(--pm-dark); color: var(--pm-gold); padding: 15px; border: 4px outset var(--pm-gold); text-align: center; }
        
        .status-badge { font-size: 12px; padding: 2px 5px; background: #e6b31e; color: black; border-radius: 3px; }
    </style>
</head>
<body>
<div class="window">
    <div class="header">
        <span>🏫 6학년 5반 교실</span>
        <span id="myInfoDisp">No.?? 학생 접속 중</span>
        <button class="pm-btn" style="font-size:12px; padding:5px 10px;" onclick="location.href='index.html'">📋 내 감정 카드 보기</button>
    </div>

    <div class="classroom-window">
        <div class="left-area" id="seatGrid"></div>

        <div class="right-area">
            <div class="info-panel">
                <h3 style="margin-top:0; border-bottom:2px solid var(--pm-dark);">📜 나의 퀘스트</h3>
                <div id="questDesc" style="font-size:18px; color:#c00; font-weight:bold; margin:20px 0; min-height:60px;">
                    퀘스트를 불러오는 중...
                </div>
                <button class="pm-btn" id="reportBtn" onclick="reportQuest()">✅ 퀘스트 완료 보고하기</button>
                
                <h3 style="margin-top:30px; border-bottom:2px solid var(--pm-dark);">📢 학급 게시판</h3>
                <div style="font-size:14px; color:#666;">
                    - 오늘은 감정 연금술 첫 날입니다.<br>
                    - 미덕 보석 5개를 모으면 특별 보상을 드립니다.
                </div>
            </div>

            <div class="gem-box">
                <h4 style="margin:0 0 10px 0;">💎 나의 미덕 보석함</h4>
                <div id="gemStats" style="font-size:16px; display:flex; justify-content:space-around;">
                    <span>배려: 0</span> <span>존중: 0</span> <span>사랑: 0</span>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const sNum = urlParams.get('num') || "1";
    document.getElementById('myInfoDisp').innerText = `No.${sNum} 학생 연구원`;

    // 좌석 초기화 (23번까지)
    const grid = document.getElementById('seatGrid');
    for(let i=1; i<=23; i++) {
        grid.innerHTML += `<div class="desk" id="seat${i}">${i}</div>`;
    }

    // 데이터 동기화
    db.ref(`room/student${sNum}`).on('value', snap => {
        if(snap.exists()){
            const data = snap.val();
            document.getElementById('questDesc').innerText = data.quest || "선택된 퀘스트가 없습니다.";
            document.getElementById('gemStats').innerHTML = `
                <span>배려: ${data.gems?.배려 || 0}</span>
                <span>존중: ${data.gems?.존중 || 0}</span>
                <span>사랑: ${data.gems?.사랑 || 0}</span>
            `;
            
            if(data.reqDone) {
                document.getElementById('reportBtn').innerText = "⏳ 승인 대기 중...";
                document.getElementById('reportBtn').disabled = true;
            } else {
                document.getElementById('reportBtn').innerText = "✅ 퀘스트 완료 보고하기";
                document.getElementById('reportBtn').disabled = false;
            }
        }
    });

    // 실시간 좌석 점등 (다른 학생들)
    db.ref('room/').on('value', snap => {
        snap.forEach(c => {
            const s = c.val();
            const seat = document.getElementById(`seat${s.num}`);
            if(seat && s.status === 'online') {
                seat.className = 'desk on';
                seat.innerHTML = `<img src="${s.emojiImg}" width="25"><br>${s.num}번`;
            }
        });
    });

    function reportQuest() {
        if(confirm("정말로 퀘스트를 완료하셨나요? 선생님께 알림이 전송됩니다.")) {
            db.ref(`room/student${sNum}`).update({ reqDone: true });
        }
    }
</script>
</body>
</html>
