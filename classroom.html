<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 교실</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); }
        body { margin:0; background:#222; font-family:'DungGeunMo'; }
        .desk-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:15px; padding:20px; }
        .desk { background:#3e2723; border:3px solid #555; height:120px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#777; }
        .desk.online { background:#fff; color:#000; border-color: gold; }
        
        .nav-bar { position:fixed; bottom:0; width:100%; background:#1a1a1a; padding:15px; display:flex; justify-content:center; gap:20px; border-top:4px solid gold; }
        .nav-btn { background:none; border:2px solid gold; color:gold; padding:10px 20px; cursor:pointer; font-family:inherit; }
        
        .popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:#fdf5e6; border:8px ridge #2d1b15; width:450px; padding:20px; z-index:2000; }
        .item-row { border-bottom:1px solid #ccc; padding:10px; display:flex; justify-content:space-between; align-items:center; }
    </style>
</head>
<body>

<div class="desk-grid" id="deskGrid"></div>

<div class="nav-bar">
    <button class="nav-btn" onclick="openPopup('popMyQuest')">🎒 내 퀘스트</button>
    <button class="nav-btn" onclick="openPopup('popBoard')">📜 퀘스트 게시판</button>
    <button class="nav-btn" onclick="openPopup('popGems')">💎 미덕 보석</button>
</div>

<div id="popMyQuest" class="popup">
    <h3>🎒 나의 수령 퀘스트 (최대 3개)</h3>
    <div id="myQuestList"></div>
    <button class="nav-btn" style="width:100%; margin-top:10px;" onclick="closePopup()">닫기</button>
</div>

<div id="popBoard" class="popup">
    <h3>📜 선생님의 퀘스트 목록</h3>
    <div id="boardList"></div>
    <button class="nav-btn" style="width:100%; margin-top:10px;" onclick="closePopup()">닫기</button>
</div>

<div id="popGems" class="popup" style="text-align:center;">
    <h3>💎 나의 미덕 주머니</h3>
    <div style="display:flex; justify-content:space-around; font-size:20px; margin:20px 0;">
        <div>🤝 존중<br><span id="gem-respect">0</span></div>
        <div>🧡 배려<br><span id="gem-care">0</span></div>
        <div>💖 사랑<br><span id="gem-love">0</span></div>
    </div>
    <button class="nav-btn" onclick="closePopup()">닫기</button>
</div>

<script>
    /* Firebase 초기화 및 내 번호 파악 생략 (위와 동일) */
    const myNum = new URLSearchParams(window.location.search).get('num');
    
    // 퀘스트 수령 및 보관 제한 (감정 1, 인성 2)
    function acceptQuest(qKey, qData) {
        db.ref(`room/student${myNum}/myQuests`).once('value', snap => {
            let count = snap.numChildren();
            let personalityCount = 0;
            snap.forEach(c => { if(c.val().type === 'personality') personalityCount++; });

            if(count >= 3) return alert("일일 최대 퀘스트(3개)를 모두 수령했습니다.");
            if(personalityCount >= 2) return alert("인성 퀘스트는 하루에 2개까지만 가능합니다.");

            db.ref(`room/student${myNum}/myQuests`).push({ ...qData, status: 'doing' });
            alert("퀘스트를 수령했습니다!");
        });
    }

    // 다했어요 보고
    function reportDone(key, qTitle) {
        db.ref(`room/student${myNum}/requestDone`).set({ key: key, title: qTitle });
        alert("선생님께 완료 보고를 보냈습니다!");
    }

    function openPopup(id) { document.getElementById(id).style.display='block'; }
    function closePopup() { document.querySelectorAll('.popup').forEach(p=>p.style.display='none'); }
</script>
</body>
</html>
