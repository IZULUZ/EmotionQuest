<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 교실</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); }
        :root { --pm-dark: #3e2723; --pm-gold: #c5a059; --pm-bg: #fdf5e6; }
        body { margin:0; background:#222; font-family:'DungGeunMo'; display:flex; justify-content:center; align-items:center; height:100vh; }
        .pm-window { width:1024px; height:750px; background:var(--pm-bg); border:12px ridge var(--pm-dark); display:flex; flex-direction:column; }
        .classroom-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:15px; padding:20px; flex:1; background:#ead7b1; border:5px inset #3e2723; margin:10px; overflow-y:auto; }
        .desk { background:#3e2723; border:3px solid var(--pm-gold); height:100px; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#555; cursor:pointer; font-size:12px; }
        .desk.online { background:#fff9eb; color:#333; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        .desk img { width:40px; margin-bottom:5px; display:none; }
        .desk.online img { display:block; }
        .bottom-bar { background:var(--pm-dark); padding:12px; display:flex; gap:10px; justify-content:center; }
        .pm-btn { background:var(--pm-dark); color:var(--pm-gold); border:4px outset var(--pm-gold); padding:8px 20px; cursor:pointer; font-family:inherit; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:200; justify-content:center; align-items:center; }
        .popup { background:var(--pm-bg); border:8px ridge var(--pm-dark); padding:20px; width:600px; }
    </style>
</head>
<body>

<div class="pm-window">
    <div class="pm-header">6-5 CLASSROOM BOARD</div>
    <div class="classroom-grid" id="deskGrid"></div>
    <div class="bottom-bar">
        <button class="pm-btn" onclick="openModal('myInven')">🎒 내 퀘스트 보관함</button>
        <button class="pm-btn" style="background:#888;" onclick="location.href='index.html'">🔙 입장 화면으로</button>
    </div>
</div>

<div id="studentDetail" class="modal"><div class="popup">
    <h2 id="detName" style="text-align:center; margin-top:0;">정보</h2>
    <div style="display:flex; gap:20px;">
        <div style="width:250px; height:250px; background:white; border:2px inset #ccc;"><canvas id="radarChart"></canvas></div>
        <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
            <div style="background:#000; color:white; padding:15px; border-radius:10px; text-align:center;">
                <img id="detImg" src="" style="width:80px; margin-bottom:10px;">
                <div id="detTag" style="color:gold; font-weight:bold;">#태그</div>
                <div id="detDiary" style="font-size:12px; color:#aaa; margin-top:5px;">성찰 기록</div>
            </div>
            <div style="font-size:18px; color:var(--pm-dark);">💎 보유 보석: <span id="detGems" style="font-weight:bold; color:#d32f2f;">0</span>개</div>
            <div id="detQuests" style="font-size:12px; background:white; padding:8px; border:1px solid #ccc; flex:1; overflow-y:auto;"></div>
        </div>
    </div>
    <button class="pm-btn" style="width:100%; margin-top:15px;" onclick="closeModal('studentDetail')">닫기</button>
</div></div>

<div id="myInven" class="modal"><div class="popup" style="width:400px;">
    <h3>🎒 내 수령 퀘스트</h3>
    <div id="myList" style="min-height:200px; background:white; border:2px inset #ccc; padding:10px;"></div>
    <button class="pm-btn" style="width:100%; margin-top:10px;" onclick="closeModal('myInven')">닫기</button>
</div></div>

<script>
    const db = firebase.database();
    const myNum = new URLSearchParams(window.location.search).get('num');

    // 책상 23개 생성
    for(let i=1; i<=23; i++) {
        let d = document.createElement('div'); d.className='desk'; d.id=`desk-${i}`;
        d.innerHTML = `No.${i}<br>부재중`; d.onclick = () => showDetail(i);
        document.getElementById('deskGrid').appendChild(d);
    }

    // 실시간 데이터
    db.ref('room/').on('value', snap => {
        snap.forEach(child => {
            const s = child.val();
            const desk = document.getElementById(`desk-${s.num}`);
            if(desk && s.status === 'online') {
                desk.classList.add('online');
                desk.innerHTML = `<img src="${s.emojiImg}"><b>${s.name}</b><span>💎${s.gems||0}</span>`;
            }
        });
    });

    function showDetail(num) {
        db.ref(`room/student${num}`).once('value', snap => {
            if(!snap.exists()) return alert("입장하지 않았습니다.");
            const s = snap.val();
            document.getElementById('detName').innerText = `${s.name}의 카드`;
            document.getElementById('detImg').src = s.emojiImg;
            document.getElementById('detTag').innerText = s.tag;
            document.getElementById('detDiary').innerText = `"${s.diary}"`;
            document.getElementById('detGems').innerText = s.gems || 0;
            
            const qList = document.getElementById('detQuests'); qList.innerHTML = "<b>현재 미션:</b><br>";
            if(s.quests) Object.values(s.quests).forEach(q => qList.innerHTML += `· ${q.title}<br>`);
            
            openModal('studentDetail');
            initChart();
        });
    }

    function initChart() {
        new Chart(document.getElementById('radarChart'), {
            type:'radar',
            data:{ labels:['자아','감정','관계','학습','회복','친절'], datasets:[{data:[60,70,50,80,60,70], borderColor:'gold', backgroundColor:'rgba(197,160,89,0.2)'}] },
            options:{plugins:{legend:{display:false}}, scales:{r:{min:0,max:100,ticks:{display:false}}}}
        });
    }

    db.ref(`room/student${myNum}/quests`).on('value', snap => {
        const list = document.getElementById('myList'); list.innerHTML = "";
        snap.forEach(child => {
            const q = child.val();
            list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee;">🎯 ${q.title} <button class="pm-btn" style="font-size:10px; float:right;" onclick="sendDone('${child.key}','${q.title}')">다했어요!</button></div>`;
        });
    });

    function sendDone(key, title) {
        db.ref(`room/student${myNum}/requestDone`).set({ key: key, title: title });
        alert("선생님께 승인 요청을 보냈습니다.");
    }

    function openModal(id) { document.getElementById(id).style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
</script>
</body>
</html>
