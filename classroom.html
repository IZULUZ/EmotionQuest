<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 메타인지 교실 현황판</title>
    <style>
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); }
        :root { --pm-dark: #3e2723; --pm-gold: #c5a059; --pm-bg: #fdf5e6; }
        body { margin: 0; background: #1a1a1a; font-family: 'DungGeunMo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .main-window { width: 980px; height: 720px; background: var(--pm-bg); border: 10px ridge var(--pm-dark); outline: 4px solid var(--pm-gold); display: flex; flex-direction: column; }
        .top-bar { background: linear-gradient(to bottom, #5d4037, #3e2723); color: var(--pm-gold); padding: 12px; text-align: center; font-size: 22px; border-bottom: 4px double var(--pm-gold); }
        .content { display: flex; flex: 1; padding: 15px; gap: 15px; }

        .desk-grid { flex: 2; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; background: #5d4037; border: 5px inset var(--pm-dark); padding: 12px; }
        .desk { background: #3e2723; border: 2px solid var(--pm-gold); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #777; transition: 0.4s; cursor: pointer; position: relative; }
        .desk.active { background: #fff9eb; color: #333; box-shadow: 0 0 20px var(--pm-gold); border: 3px solid var(--pm-gold); }
        .desk-num { position: absolute; top: 3px; left: 5px; font-size: 10px; color: var(--pm-gold); }

        .board-side { width: 280px; background: #fff9eb; border: 4px double var(--pm-dark); padding: 15px; display: flex; flex-direction: column; }
        .quest-list { flex: 1; background: white; border: 3px inset var(--pm-dark); margin: 10px 0; padding: 10px; overflow-y: auto; font-size: 14px; color: #444; }
        .pm-btn { background: var(--pm-dark); color: var(--pm-gold); border: 4px outset var(--pm-gold); padding: 8px; cursor: pointer; font-family: inherit; }
    </style>
</head>
<body>

<div class="main-window">
    <div class="top-bar">6-5 CLASSROOM META-COGNITION BOARD</div>
    <div class="content">
        <div class="desk-grid" id="deskGrid"></div>
        <div class="board-side">
            <h3 style="margin:0; text-align:center;">📜 인성 퀘스트</h3>
            <div class="quest-list" id="qList"></div>
            <input type="text" id="qIn" style="width:92%; padding:8px; margin-bottom:5px; font-family:inherit;" placeholder="공통 미션 추가...">
            <button class="pm-btn" onclick="addQ()">퀘스트 게시</button>
            <button class="pm-btn" style="margin-top:10px; background:#8b4513;" onclick="location.href='index.html'">내 성찰창으로</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
        authDomain: "secret-quest-class.firebaseapp.com",
        databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/",
        projectId: "secret-quest-class",
        storageBucket: "secret-quest-class.firebasestorage.app",
        messagingSenderId: "397245266210",
        appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    for(let i=1; i<=23; i++) {
        const d = document.createElement('div'); d.className='desk'; d.id=`desk-${i}`;
        d.innerHTML = `<span class="desk-num">${i}</span><div style="font-size:12px;">준비중</div>`;
        document.getElementById('deskGrid').appendChild(d);
    }

    database.ref('room/').on('value', snap => {
        const data = snap.val();
        if(!data) return;
        Object.values(data).forEach(s => {
            const desk = document.getElementById(`desk-${s.num}`);
            if(desk) {
                desk.className = 'desk active';
                desk.innerHTML = `<span class="desk-num">${s.num}</span><div style="font-size:35px;">${s.emoji}</div><div style="font-weight:bold; font-size:13px;">${s.name}</div>`;
                desk.onclick = () => alert(`[${s.name}의 성찰 일기]\n${s.diary}`);
            }
        });
    });

    function addQ() {
        const v = document.getElementById('qIn').value;
        if(v) {
            database.ref('commonQuests').push(v);
            document.getElementById('qIn').value = "";
        }
    }

    database.ref('commonQuests').on('value', snap => {
        const list = document.getElementById('qList'); list.innerHTML = "";
        snap.forEach(c => {
            const div = document.createElement('div'); div.style.padding="8px 0"; div.style.borderBottom="1px dashed #ccc";
            div.innerText = "◈ " + c.val(); list.appendChild(div);
        });
    });
</script>
</body>
</html>
