<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 Emotion Classroom Board</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="pm-window">
    <div class="pm-header">6학년 5반 감정 지도 (Classroom Emotion Status)</div>
    
    <div class="pm-container">
        <div class="pm-main-panel" style="flex: 2;">
            <div id="deskContainer" class="desk-grid-pm">
                </div>
        </div>

        <div class="pm-side-panel" style="width: 280px;">
            <h3 style="margin-top:0; color:var(--pm-dark);">📜 인성 퀘스트</h3>
            <div id="questBoard" class="pm-quest-list">
                </div>
            
            <div style="margin-top:auto; padding-top:10px; border-top:2px double var(--pm-gold); width:100%;">
                <input type="text" id="newQ" style="width:100%; margin-bottom:5px; font-family:inherit;" placeholder="퀘스트 내용 입력...">
                <button class="pm-btn" style="width:100%; font-size:14px;" onclick="addQuest()">미션 추가</button>
            </div>
            <button class="pm-btn" style="width:100%; margin-top:10px; background:#8b4513;" onclick="location.href='index.html'">🔙 내 카드로</button>
        </div>
    </div>
</div>

<div id="cardModal" class="modal">
    <div class="pm-popup" style="width:400px; background: #000; border: 6px double var(--pm-gold); color: white;">
        <div id="detName" style="color:var(--pm-gold); border-bottom:1px solid var(--pm-gold); padding-bottom:5px;"></div>
        <div id="detEmoji" style="font-size:120px; text-align:center; margin:20px 0;">✨</div>
        <div id="detTags" style="color:#00aaff; font-weight:bold;"></div>
        <div id="detDiary" style="margin:15px 0; font-size:14px; color:#ccc; line-height:1.6;"></div>
        <div id="detQuest" style="border-top:1px solid #333; padding-top:10px; color:#ffd700; font-size:13px;"></div>
        <button class="pm-btn" style="width:100%; margin-top:20px;" onclick="closeModal()">확인</button>
    </div>
</div>

<script>
    // Firebase 설정 (index.html과 반드시 동일하게!)
    const firebaseConfig = {
        apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
        authDomain: "secret-quest-class.firebaseapp.com",
        databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/",
        projectId: "secret-quest-class",
        storageBucket: "secret-quest-class.firebasestorage.app",
        messagingSenderId: "397245266210",
        appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 1. 책상 그리드 생성 (23개)
    const container = document.getElementById('deskContainer');
    for(let i=1; i<=23; i++) {
        const d = document.createElement('div');
        d.className = 'pm-desk'; 
        d.id = `desk-${i}`;
        d.innerHTML = `<div class="desk-label">${i}</div>`;
        container.appendChild(d);
    }

    // 2. 실시간 데이터 수신 및 책상 업데이트
    database.ref('room/').on('value', snap => {
        const data = snap.val();
        if(!data) return;
        Object.values(data).forEach(s => {
            const desk = document.getElementById(`desk-${s.num}`);
            if(desk) {
                desk.classList.add('active'); // 불 들어오는 효과
                desk.innerHTML = `
                    <div class="desk-label">${s.num}</div>
                    <div class="desk-emoji-view">${s.emoji || '🧍'}</div>
                    <div class="desk-name-view">${s.name}</div>
                `;
                desk.onclick = () => openCard(s);
            }
        });
    });

    // 3. 학생 상세 카드 열기
    function openCard(s) {
        document.getElementById('cardModal').style.display = 'flex';
        document.getElementById('detName').innerText = `${s.num}번 ${s.name}의 상태`;
        document.getElementById('detEmoji').innerText = s.emoji;
        document.getElementById('detTags').innerText = s.tags || "#태그없음";
        document.getElementById('detDiary').innerText = s.diary || "기록된 마음이 없습니다.";
        document.getElementById('detQuest').innerText = `🎯 인성 미션: ${s.quest || '미선택'}`;
    }

    function closeModal() { document.getElementById('cardModal').style.display = 'none'; }

    // 4. 인성 퀘스트 관리
    function addQuest() {
        const val = document.getElementById('newQ').value;
        if(val) {
            database.ref('commonQuests').push(val);
            document.getElementById('newQ').value = "";
        }
    }

    database.ref('commonQuests').on('value', snap => {
        const board = document.getElementById('questBoard');
        board.innerHTML = "";
        snap.forEach(child => {
            const div = document.createElement('div');
            div.className = 'pm-quest-item';
            div.innerText = "◈ " + child.val();
            board.appendChild(div);
        });
    });
</script>
</body>
</html>
