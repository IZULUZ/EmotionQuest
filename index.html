<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6학년 5반 감정 메이커</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="game-window">
    <div class="window-header">
        <span>PRINCESS MAKER: EMOTION CLASS</span>
        <div>
            <button class="pixel-btn" onclick="switchStudent(1)" style="padding:2px 10px;">1번 남학생</button>
            <button class="pixel-btn" onclick="switchStudent(2)" style="padding:2px 10px;">2번 여학생</button>
        </div>
    </div>

    <div class="main-ui">
        <div class="left-panel">
            <h2 id="studentName">1번 학생: 홍길동</h2>
            <div class="char-frame">
                <img id="charImg" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Man%20Standing.png" class="char-img">
            </div>
            <div class="status-window">
                <div class="stat-row">의욕 <div class="gauge-bg"><div id="bar-en" class="gauge-fill" style="background: #ff4757; width:20%;"></div></div></div>
                <div class="stat-row">안정 <div class="gauge-bg"><div id="bar-re" class="gauge-fill" style="background: #2ed573; width:20%;"></div></div></div>
                <div class="stat-row">민감 <div class="gauge-bg"><div id="bar-se" class="gauge-fill" style="background: #1e90ff; width:20%;"></div></div></div>
            </div>
        </div>

        <div class="right-panel">
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                <button class="pixel-btn" onclick="selectMood('happy')">🤩 기쁨</button>
                <button class="pixel-btn" onclick="selectMood('calm')">😌 평온</button>
                <button class="pixel-btn" onclick="selectMood('sad')">😢 슬픔</button>
                <button class="pixel-btn" onclick="selectMood('angry')">💢 화남</button>
            </div>

            <div id="activityZone" style="display:none;">
                <div class="kitchen-box">
                    <span id="kitEmoji">?</span> + ✨ = <span id="kitResult">?</span>
                    <div style="font-size:16px; color:#aaa; margin-top:5px;">감정 키워드: <span id="kitTag">분석중</span></div>
                </div>

                <div style="margin-top:15px;">
                    <strong>이 마음이 드는 구체적인 이유:</strong>
                    <textarea id="diary" style="width:100%; height:60px; margin-top:5px; font-family:inherit; padding:10px;"></textarea>
                </div>

                <div style="margin-top:15px;">
                    <strong>[하나의 퀘스트를 선택하세요]</strong>
                    <div id="questList"></div>
                </div>

                <button class="pixel-btn" style="background:var(--accent); margin-top:20px;" onclick="uploadData()">오늘의 감정 전송하기</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
        authDomain: "secret-quest-class.firebaseapp.com",
        databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/",
        projectId: "secret-quest-class",
        storageBucket: "secret-quest-class.firebasestorage.app",
        messagingSenderId: "397245266210",
        appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentId = 1;
    let selectedQuest = "";
    let finalEmoji = "";

    const assets = {
        1: { name: "홍길동(남)", base: "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Man%20Standing.png",
             happy: "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Man%20Dancing.png",
             sad: "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Man%20Facepalming.png",
             angry: "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Man%20Pouting.png" },
        2: { name: "김지수(여)", base: "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Woman%20Standing.png",
             happy: "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Woman%20Dancing.png",
             sad: "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Woman%20Facepalming.png",
             angry: "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Woman%20Pouting.png" }
    };

    function switchStudent(id) {
        currentId = id;
        document.getElementById('studentName').innerText = assets[id].name;
        document.getElementById('charImg').src = assets[id].base;
    }

    function selectMood(mood) {
        document.getElementById('activityZone').style.display = 'block';
        const img = document.getElementById('charImg');
        const qList = document.getElementById('questList');
        qList.innerHTML = "";
        
        let quests = [];
        if(mood === 'happy') {
            img.src = assets[currentId].happy;
            document.getElementById('kitEmoji').innerText = "🤩";
            document.getElementById('kitResult').innerText = "🌈";
            document.getElementById('kitTag').innerText = "#뿌듯함 #설렘";
            quests = ["친구에게 칭찬 한마디", "오늘의 행운 나누기", "감사 일기 쓰기"];
        } else if(mood === 'sad') {
            img.src = assets[currentId].sad;
            document.getElementById('kitEmoji').innerText = "😢";
            document.getElementById('kitResult').innerText = "☔";
            document.getElementById('kitTag').innerText = "#위로필요 #속상함";
            quests = ["나를 위한 셀프허그", "슬픈 마음 종이에 쓰기", "좋아하는 노래 듣기"];
        } else {
             img.src = assets[currentId].angry;
             document.getElementById('kitEmoji').innerText = "💢";
             document.getElementById('kitResult').innerText = "🔥";
             document.getElementById('kitTag').innerText = "#화남 #억울함";
             quests = ["심호흡 10번 하기", "찬물 한 잔 마시기", "숫자 거꾸로 세기"];
        }

        quests.forEach(q => {
            const div = document.createElement('div');
            div.className = 'quest-item';
            div.innerText = q;
            div.onclick = function() {
                Array.from(qList.children).forEach(c => c.classList.remove('active'));
                div.classList.add('active');
                selectedQuest = q;
            };
            qList.appendChild(div);
        });
    }

    function uploadData() {
        if(!selectedQuest) return alert("퀘스트를 하나 선택해주세요!");
        database.ref('room/student' + currentId).set({
            name: assets[currentId].name, num: currentId, emoji: document.getElementById('kitResult').innerText,
            diary: document.getElementById('diary').value, quest: selectedQuest, status: "online"
        }).then(() => { alert("교실로 전송 성공!"); location.href = "classroom.html"; });
    }
</script>
</body>
</html>
