<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 감정 퀘스트 관리국 - 학생용</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="pm-window">
    <div class="pm-header">6-5 EMOTION QUEST BUREAU (Student Mode)</div>
    <div class="pm-container">
        <div class="pm-side">
            <h3 id="userName" style="text-align:center; margin:0 0 10px 0;">사용자 정보 로딩 중...</h3>
            <div class="avatar-frame">
                <img id="avatarImg" src="" style="width:100%; height:100%;">
            </div>
            <div class="radar-container">
                <canvas id="radarChart"></canvas>
            </div>
            <div id="advice" style="font-size:12px; color:#5d4037; padding:5px; background:#fff; border:1px solid var(--pm-gold); height:40px; overflow:hidden;">
                "자신의 내면을 들여다보는 시간입니다."
            </div>
            <button class="pm-btn" style="margin-top:10px;" onclick="openModal('customModal')">👗 아바타 커스텀</button>
            <button class="pm-btn" style="margin-top:5px;" onclick="openModal('myQuestModal')">🎒 내 퀘스트 보관함</button>
        </div>

        <div style="flex:1; display:flex; flex-direction:column; gap:10px;">
            <div style="background:#000; border:4px double var(--pm-gold); flex:1; padding:20px; color:white; text-align:center; border-radius:15px;">
                <div style="font-size:12px; color:var(--pm-gold);">[ REAL-TIME EMOTION CARD ]</div>
                <div id="resEmoji" style="font-size:120px; margin:20px 0;">✨</div>
                <div id="resTags" style="color:#00aaff; font-size:18px;">#감정을_믹스하세요</div>
                <div id="resDiary" style="font-size:14px; color:#ccc;">연금술로 오늘을 기록하세요...</div>
                
                <div id="activeQuestArea" style="margin-top:20px; border:1px solid #444; padding:10px; display:none;">
                    🎯 진행 중: <span id="qTitle" style="color:gold;"></span>
                    <button class="pm-btn" style="font-size:12px; margin-left:10px;" onclick="requestComplete()">다했어요!</button>
                </div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="pm-btn" style="flex:1;" onclick="openModal('mixModal')">🔮 감정 연금술</button>
                <button class="pm-btn" style="flex:1; background:var(--pm-gold); color:var(--pm-dark);" onclick="openModal('boardModal')">📜 퀘스트 고르기</button>
            </div>
            <button class="pm-btn" style="height:60px; font-size:20px; background:var(--pm-gold); color:var(--pm-dark);" onclick="sendData()">교실 전송 및 입장 🚪</button>
        </div>
    </div>
</div>

<div id="mixModal" class="modal">
    <div class="pm-popup">
        <h2 style="text-align:center;">감정 연금술 도구</h2>
        <div id="emojiGrid" style="display:grid; grid-template-columns:repeat(8,1fr); height:200px; overflow-y:auto; background:white; padding:10px; border:3px inset #ccc;"></div>
        <div style="display:flex; justify-content:center; align-items:center; font-size:50px; margin:20px 0; background:white; border:3px inset #ccc; padding:10px;">
            <span id="m1">?</span> + <span id="m2">?</span> = <span id="mRes">?</span>
        </div>
        <input type="text" id="diaryIn" style="width:100%; padding:10px; font-family:inherit; box-sizing:border-box;" placeholder="오늘의 성찰 일기...">
        <button class="pm-btn" style="width:100%; margin-top:10px;" onclick="finishMix()">연금술 완료</button>
        <button class="pm-btn" style="position:absolute; top:10px; right:10px;" onclick="closeModal('mixModal')">X</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
        authDomain: "secret-quest-class.firebaseapp.com",
        databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/",
        projectId: "secret-quest-class",
        storageBucket: "secret-quest-class.firebasestorage.app",
        messagingSenderId: "397245266210",
        appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 사용자 식별 (자동 이름 매칭)
    let sNum = prompt("출석 번호를 입력하세요 (1~23)", "1");
    let sName = sNum == "1" ? "강현우" : (sNum == "2" ? "김서연" : sNum + "번 학생");
    let e1 = "", e2 = "", selEmoji = "✨", activeQuest = "";

    // 육각형 차트 (메타인지)
    
    const ctx = document.getElementById('radarChart').getContext('2d');
    const radar = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['자아', '조절', '관계', '의욕', '회복', '친절'],
            datasets: [{ data: [60, 50, 70, 40, 60, 50], backgroundColor: 'rgba(197, 160, 89, 0.2)', borderColor: '#c5a059', borderWidth: 2 }]
        },
        options: { scales: { r: { min: 0, max: 100, ticks: { display: false } } }, plugins: { legend: { display: false } } }
    });

    window.onload = () => {
        document.getElementById('userName').innerText = `NO.${sNum} ${sName}`;
        updateAvatar('pixel-art', sNum);
        const grid = document.getElementById('emojiGrid');
        const emojis = ["😊","😡","😢","🥰","😎","🥳","😌","🔥","🌈","🍵","🧊","⭐","🍀","🎈","🎨","🎮"];
        emojis.forEach(e => {
            let b = document.createElement('button'); b.className='pm-btn'; b.innerText=e;
            b.onclick = () => {
                if(!e1 || (e1 && e2)) { e1=e; e2=""; document.getElementById('m1').innerText=e1; document.getElementById('m2').innerText="?"; }
                else { e2=e; document.getElementById('m2').innerText=e2; document.getElementById('mRes').innerText="🔮"; selEmoji="🔮"; }
            };
            grid.appendChild(b);
        });
    };

    function updateAvatar(type, seed) {
        document.getElementById('avatarImg').src = `https://api.dicebear.com/7.x/${type}/svg?seed=${seed}&flip=true`;
    }

    function finishMix() {
        document.getElementById('resEmoji').innerText = selEmoji;
        document.getElementById('resDiary').innerText = document.getElementById('diaryIn').value;
        closeModal('mixModal');
    }

    function sendData() {
        db.ref('room/student'+sNum).update({
            num: sNum, name: sName, emoji: selEmoji,
            diary: document.getElementById('resDiary').innerText,
            status: "online"
        }).then(() => location.href='classroom.html');
    }

    function openModal(id) { document.getElementById(id).style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
</script>
</body>
</html>
