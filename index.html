<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 감정 연금술</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="window">
    <div class="header">
        <span>📅 2026년 2월 28일</span>
        <span>🔮 감정 연금술 연구소</span>
        <span id="stNum">No.??</span>
    </div>
    <div class="main-content">
        <div class="left-panel">
            <div class="frame char-frame">
                <img id="myAvatar" src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/1.gif" class="avatar">
                <div id="myEmoji" class="emoji-overlay"></div>
            </div>
            <div class="frame status-frame">
                <canvas id="statChart"></canvas>
            </div>
        </div>
        <div class="right-panel">
            <div class="frame" style="flex:1;">
                <h3>1. 이모지 재료 합성</h3>
                <div id="emojiGrid" style="display:grid; grid-template-columns:repeat(8,1fr); height:120px; overflow-y:auto; border:2px inset #333; padding:5px; background:white;"></div>
                <div id="mixPreview" style="text-align:center; font-size:30px; margin:10px 0;">❓ + ❓ = ✨</div>
                
                <h3>2. 감정 단어 선택</h3>
                <div id="tagList"></div>
                
                <input type="text" id="diary" placeholder="오늘의 한 줄 일기를 기록하세요..." style="width:95%; padding:10px; margin-top:10px; font-family:inherit;">
                <button class="pm-btn" style="margin-top:20px;" onclick="openQuestModal()">✨ 감정 분석 & 퀘스트 받기</button>
            </div>
        </div>
    </div>
</div>

<div id="qModal" class="modal">
    <div class="modal-content">
        <h2>📜 오늘의 분석 결과</h2>
        <p id="analysisMsg"></p>
        <div id="questList" style="display:flex; gap:10px; justify-content:center; margin:20px 0;"></div>
        <button class="pm-btn" id="entryBtn" disabled onclick="submitAll()">교실로 입장하기 🚪</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8", authDomain: "secret-quest-class.firebaseapp.com", databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/", projectId: "secret-quest-class", storageBucket: "secret-quest-class.firebasestorage.app", messagingSenderId: "397245266210", appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    let sNum = prompt("본인의 번호를 입력하세요", "1") || "1";
    document.getElementById('stNum').innerText = `No.${sNum}`;
    document.getElementById('myAvatar').src = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/${sNum}.gif`;

    const emojis = ["😊","😡","😢","🥰","🤔","🥳","😎","😴","🔥","🌈","🤢","😱","🤩","😭","🫠","🤯","🥺","🤤","👺","👾","👻","💀","🤡","🤖","🎃","⭐","🌙","🍀","💎","🎨","🎮","⚽"];
    const tagsArr = ["기쁨", "설렘", "분노", "우울", "긴장", "평온", "피곤", "자신감"];
    let sel1=null, sel2=null, finalEmojiImg="", selectedTags=[], selectedQuest=null;

    // 초기 차트
    const ctx = document.getElementById('statChart').getContext('2d');
    const myChart = new Chart(ctx, { type: 'radar', data: { labels: ["배려", "존중", "성실", "용기", "절제", "사랑"], datasets: [{ data: [50,50,50,50,50,50], backgroundColor: 'rgba(230,179,30,0.3)', borderColor: 'var(--pm-gold)' }] }, options: { scales: { r: { min:0, max:100, ticks:{display:false} } }, plugins:{legend:{display:false}} } });

    // 이모지 그리드
    const grid = document.getElementById('emojiGrid');
    emojis.forEach(e => {
        let d = document.createElement('div'); d.style.cursor='pointer'; d.innerText=e; d.style.fontSize='24px';
        d.onclick = () => {
            if(!sel1 || (sel1 && sel2)) { sel1=e; sel2=null; document.getElementById('mixPreview').innerText = `${e} + ❓ = ✨`; }
            else { sel2=e; updateMix(); }
        };
        grid.appendChild(d);
    });

    function updateMix() {
        const u1 = sel1.codePointAt(0).toString(16); const u2 = sel2.codePointAt(0).toString(16);
        finalEmojiImg = `https://www.gstatic.com/android/keyboard/emojikitchen/20201001/u${u1}/u${u1}_u${u2}.png`;
        document.getElementById('mixPreview').innerHTML = `${sel1} + ${sel2} = <img src="${finalEmojiImg}" width="40">`;
        document.getElementById('myEmoji').innerHTML = `<img src="${finalEmojiImg}" width="80">`;
    }

    const tL = document.getElementById('tagList');
    tagsArr.forEach(t => {
        let s = document.createElement('span'); s.className='tag'; s.innerText=t;
        s.onclick = () => {
            if(s.classList.contains('on')){ s.classList.remove('on'); selectedTags = selectedTags.filter(i=>i!==t); }
            else if(selectedTags.length < 2){ s.classList.add('on'); selectedTags.push(t); }
        };
        tL.appendChild(s);
    });

    function openQuestModal() {
        if(!finalEmojiImg || selectedTags.length===0) return alert("이모지 합성와 태그 선택을 완료하세요!");
        document.getElementById('qModal').style.display='flex';
        document.getElementById('analysisMsg').innerText = `[${selectedTags.join(", ")}] 감정이 느껴지는군요. 이 에너지를 인성 보석으로 바꿔봅시다!`;
        
        const qList = document.getElementById('questList'); qList.innerHTML="";
        const types = ["배려", "존중", "사랑"];
        types.forEach(type => {
            let b = document.createElement('button'); b.className='pm-btn'; b.style.width='150px'; b.innerText=`[${type}] 퀘스트`;
            b.onclick = () => { selectedQuest = {title: `${type} 퀘스트 완료하기`, type: type}; document.getElementById('entryBtn').disabled=false; };
            qList.appendChild(b);
        });
    }

    function submitAll() {
        db.ref(`room/student${sNum}`).set({
            num:sNum, charImg:document.getElementById('myAvatar').src, emojiImg:finalEmojiImg,
            diary:document.getElementById('diary').value, tags:selectedTags, status:'online',
            gems:{배려:0,존중:0,사랑:0}, stats:[60,70,55,80,65,75]
        });
        db.ref(`room/student${sNum}/myQuests`).push(selectedQuest).then(() => location.href=`classroom.html?num=${sNum}`);
    }
</script>
</body>
</html>
