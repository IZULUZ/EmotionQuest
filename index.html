<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 감정 연금술소</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); }
        :root { --pm-dark: #3e2723; --pm-gold: #c5a059; --pm-bg: #fdf5e6; }
        body { margin: 0; background: #1a1a1a; font-family: 'DungGeunMo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .pm-window { width: 900px; height: 650px; background: var(--pm-bg); border: 12px ridge var(--pm-dark); outline: 4px solid var(--pm-gold); display: flex; flex-direction: column; }
        .pm-header { background: linear-gradient(to bottom, #5d4037, #3e2723); color: var(--pm-gold); padding: 10px; text-align: center; font-size: 22px; border-bottom: 4px double var(--pm-gold); }
        .content { display: flex; flex: 1; padding: 20px; gap: 20px; }
        .side { width: 300px; display: flex; flex-direction: column; gap: 10px; }
        .avatar-preview { width: 100%; height: 250px; background: white; border: 4px inset var(--pm-dark); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .main-card { flex: 1; background: #000; border: 4px double var(--pm-gold); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; padding: 20px; }
        .pm-btn { background: var(--pm-dark); color: var(--pm-gold); border: 4px outset var(--pm-gold); padding: 10px; cursor: pointer; font-family: inherit; }
        .pm-btn:active { border-style: inset; }
        input { padding: 10px; font-family: inherit; border: 3px inset #ccc; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center; }
        .modal-inner { background: var(--pm-bg); border: 8px ridge var(--pm-dark); padding: 20px; width: 450px; }
    </style>
</head>
<body>

<div class="pm-window">
    <div class="pm-header">6-5 EMOTION ALCHEMY LAB</div>
    <div class="content">
        <div class="side">
            <div class="avatar-preview"><img id="avatarImg" src="" style="height:110%"></div>
            <button class="pm-btn" onclick="openModal('customModal')">👗 아바타 커스텀</button>
            <button class="pm-btn" onclick="openModal('mixModal')">🔮 감정 연금술(Kitchen)</button>
            <div id="statusAdvice" style="font-size:12px; background:white; padding:10px; border:1px solid var(--pm-gold); flex:1; margin-top:10px;">"감정을 섞어 당신만의 카드를 만드세요."</div>
        </div>
        <div class="main-card">
            <div style="font-size:12px; color:gold;">[ EMOTION IDENTITY CARD ]</div>
            <div id="resEmoji" style="font-size:120px; margin:20px 0;">✨</div>
            <div id="resTags" style="color:#00aaff; font-size:20px; font-weight:bold;">#신분 확인 대기</div>
            <div id="resDiary" style="color:#ccc; text-align:center; padding: 0 20px;">연금술을 통해 오늘의 성찰을 기록하세요.</div>
            <button class="pm-btn" style="margin-top:auto; width:100%; height:60px; font-size:20px;" onclick="enterClass()">교실로 전송 및 입장 🚪</button>
        </div>
    </div>
</div>

<div id="mixModal" class="modal"><div class="modal-inner">
    <h3>🔮 감정 믹서</h3>
    <input type="text" id="diaryInput" style="width:100%" placeholder="오늘의 기분 성찰...">
    <div style="margin:10px 0; display:grid; grid-template-columns:repeat(5,1fr); gap:5px;" id="emojiGrid"></div>
    <button class="pm-btn" style="width:100%" onclick="finishMix()">믹스 완료</button>
</div></div>

<div id="customModal" class="modal"><div class="modal-inner">
    <h3>👗 캐릭터 스타일</h3>
    <button class="pm-btn" onclick="setAvatar('adventurer')">모험가</button>
    <button class="pm-btn" onclick="setAvatar('pixel-art')">픽셀</button>
    <button class="pm-btn" onclick="setAvatar('bottts')">로봇</button>
    <button class="pm-btn" onclick="closeModal('customModal')">닫기</button>
</div></div>

<script>
    const firebaseConfig = { /* 동일한 설정 */ apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8", authDomain: "secret-quest-class.firebaseapp.com", databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/", projectId: "secret-quest-class", storageBucket: "secret-quest-class.firebasestorage.app", messagingSenderId: "397245266210", appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    let sNum = prompt("번호 입력(1~23)", "1");
    let sName = sNum=="1"?"강현우": (sNum=="2"?"김서연":sNum+"번 학생");
    let currentStyle = "adventurer"; let selEmoji = "🔮";

    function setAvatar(style) { currentStyle = style; document.getElementById('avatarImg').src = `https://api.dicebear.com/7.x/${style}/svg?seed=${sNum}`; }
    function finishMix() {
        document.getElementById('resEmoji').innerText = "🔮";
        document.getElementById('resDiary').innerText = document.getElementById('diaryInput').value;
        document.getElementById('resTags').innerText = "#성찰_완료";
        closeModal('mixModal');
    }
    function enterClass() {
        db.ref(`room/student${sNum}`).update({
            num: sNum, name: sName, emoji: "🔮", diary: document.getElementById('resDiary').innerText,
            style: currentStyle, status: "online", lastUpdate: Date.now()
        }).then(() => location.href = 'classroom.html?num='+sNum);
    }
    function openModal(id) { document.getElementById(id).style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    setAvatar('adventurer');
</script>
</body>
</html>
