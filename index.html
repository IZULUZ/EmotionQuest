<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 메타인지 감정 데이터 센터</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
        }
        :root { --pm-dark: #3e2723; --pm-gold: #c5a059; --pm-bg: #fdf5e6; }
        
        body { margin: 0; background: #1a1a1a; font-family: 'DungGeunMo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; color: var(--pm-dark); overflow: hidden; }
        .main-window { width: 980px; height: 720px; background: var(--pm-bg); border: 10px ridge var(--pm-dark); outline: 4px solid var(--pm-gold); display: flex; flex-direction: column; position: relative; }
        .top-bar { background: linear-gradient(to bottom, #5d4037, #3e2723); color: var(--pm-gold); padding: 12px; text-align: center; font-size: 22px; border-bottom: 4px double var(--pm-gold); }
        .content { display: flex; flex: 1; padding: 15px; gap: 15px; overflow: hidden; }
        
        /* 왼쪽 상태창 */
        .status-side { width: 340px; background: #fff9eb; border: 4px double var(--pm-dark); padding: 15px; display: flex; flex-direction: column; }
        .char-box { width: 100%; height: 220px; background: white; border: 4px inset var(--pm-dark); position: relative; margin-bottom: 10px; display: flex; justify-content: center; align-items: center;}
        .char-layer { width: 180px; height: 180px; }
        
        /* 메타인지 스테이터스 (클릭 가능) */
        .stat-item { font-size: 13px; margin-bottom: 8px; cursor: pointer; }
        .bar-bg { background: #444; height: 16px; border: 1px solid var(--pm-gold); margin-top: 3px; position: relative; }
        .bar-fill { height: 100%; transition: 0.3s; width: 50%; }

        /* 오른쪽 메인 창 */
        .card-main { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .emotion-card { background: #000; border: 4px double var(--pm-gold); flex: 1; border-radius: 15px; padding: 20px; color: white; text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .pm-btn { background: var(--pm-dark); color: var(--pm-gold); border: 4px outset var(--pm-gold); padding: 10px; cursor: pointer; font-family: inherit; font-size: 16px; margin-top: 5px; }
        .pm-btn:hover { filter: brightness(1.2); }
        .pm-btn:active { border-style: inset; }

        /* 팝업 모달 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal-body { background: var(--pm-bg); border: 8px ridge var(--pm-dark); padding: 25px; width: 600px; position: relative; }
        .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; height: 250px; overflow-y: auto; background: white; padding: 10px; border: 3px inset var(--pm-dark); }
        .selected-box { border: 3px solid var(--pm-gold) !important; background: #fff9eb !important; }
    </style>
</head>
<body>

<div class="main-window">
    <div class="top-bar">6-5 META-COGNITION DATA CENTER</div>
    <div class="content">
        <div class="status-side">
            <h3 style="margin:0 0 10px 0; text-align:center;">오늘의 성찰 상태</h3>
            <div class="char-box">
                <img id="avatarBase" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="char-layer">
            </div>
            
            <div id="statControls">
                <div class="stat-item" onclick="updateStat('s1', event)">자기이해 <div class="bar-bg"><div id="s1" class="bar-fill" style="width:50%; background:#ff5252;"></div></div></div>
                <div class="stat-item" onclick="updateStat('s2', event)">감정조절 <div class="bar-bg"><div id="s2" class="bar-fill" style="width:50%; background:#42a5f5;"></div></div></div>
                <div class="stat-item" onclick="updateStat('s3', event)">관계지수 <div class="bar-bg"><div id="s3" class="bar-fill" style="width:50%; background:#66bb6a;"></div></div></div>
                <div class="stat-item" onclick="updateStat('s4', event)">학습의욕 <div class="bar-bg"><div id="s4" class="bar-fill" style="width:50%; background:#ffca28;"></div></div></div>
                <div class="stat-item" onclick="updateStat('s5', event)">회복탄력 <div class="bar-bg"><div id="s5" class="bar-fill" style="width:50%; background:#ab47bc;"></div></div></div>
            </div>

            <button class="pm-btn" style="margin-top:10px;" onclick="openModal('kitchenModal')">감정 연금술 열기</button>
            <button class="pm-btn" style="font-size:12px;" onclick="openModal('customModal')">⚙️ 아바타 스타일 변경</button>
        </div>

        <div class="card-main">
            <div class="emotion-card">
                <div style="font-size:12px; color:var(--pm-gold); border-bottom:1px solid #333; padding-bottom:10px;">MY EMOTION REPORT</div>
                <div id="resEmoji" style="font-size:150px; margin:20px 0;">✨</div>
                <div id="resDiary" style="color:#ccc; font-size:18px; min-height: 50px;">오늘의 마음을 섞어주세요.</div>
            </div>
            <button class="pm-btn" style="height:70px; font-size:22px; background:var(--pm-gold); color:var(--pm-dark);" onclick="sendData()">교실 전송 및 입장 🚪</button>
        </div>
    </div>
</div>

<div id="kitchenModal" class="modal">
    <div class="modal-body">
        <h2 style="text-align:center; margin:0 0 15px 0;">연금술 재료 선택</h2>
        <div class="emoji-grid" id="pallet"></div>
        <div style="display:flex; justify-content:space-around; align-items:center; margin:20px 0;">
            <div id="box1" style="width:80px; height:80px; background:white; border:3px inset #ccc; font-size:50px; display:flex; justify-content:center; align-items:center;">?</div>
            <span style="font-size:40px;">+</span>
            <div id="box2" style="width:80px; height:80px; background:white; border:3px inset #ccc; font-size:50px; display:flex; justify-content:center; align-items:center;">?</div>
            <span style="font-size:40px;">=</span>
            <div id="boxRes" style="width:80px; height:80px; background:white; border:3px inset #ccc; font-size:50px; display:flex; justify-content:center; align-items:center;">?</div>
        </div>
        <div id="inputSection" style="display:none;">
            <input type="text" id="diaryIn" style="width:100%; padding:12px; font-family:inherit; box-sizing:border-box;" placeholder="오늘 마음이 어떤지 한 줄로 적어보세요.">
            <button class="pm-btn" style="width:100%; margin-top:10px;" onclick="completeAlchemy()">합성 완료</button>
        </div>
        <button class="pm-btn" style="position:absolute; top:10px; right:10px;" onclick="closeModal('kitchenModal')">X</button>
    </div>
</div>

<div id="customModal" class="modal">
    <div class="modal-body" style="width:300px; text-align:center;">
        <h3 style="margin-top:0;">아바타 스타일</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="pm-btn" onclick="changeAvatar('Felix')">스타일 A</button>
            <button class="pm-btn" onclick="changeAvatar('Willow')">스타일 B</button>
            <button class="pm-btn" onclick="changeAvatar('Jack')">스타일 C</button>
            <button class="pm-btn" onclick="changeAvatar('Aiden')">스타일 D</button>
        </div>
        <button class="pm-btn" style="width:100%; margin-top:20px; background:#888;" onclick="closeModal('customModal')">닫기</button>
    </div>
</div>

<script>
    // Firebase 초기화 확인
    const firebaseConfig = {
        apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
        authDomain: "secret-quest-class.firebaseapp.com",
        databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/",
        projectId: "secret-quest-class",
        storageBucket: "secret-quest-class.firebasestorage.app",
        messagingSenderId: "397245266210",
        appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let e1 = "", e2 = "", studentId = prompt("본인의 번호를 입력하세요 (1~23)", "1");

    // 초기화 함수
    window.onload = function() {
        const pallet = document.getElementById('pallet');
        const emojis = ["😊","😆","🥰","😎","🥳","😌","☁️","🍵","🌱","🌊","💢","😡","😢","😫","🔥","✨","🌈","💎","🍀","⭐","⚽","🎮","🎨","🍕","🍭","🌸","🐱","🐶","🌙","🚀"];
        
        emojis.forEach(e => {
            const btn = document.createElement('button');
            btn.className = 'pm-btn';
            btn.style.fontSize = '24px';
            btn.innerText = e;
            btn.onclick = () => selectEmoji(e);
            pallet.appendChild(btn);
        });
        
        updateBoxEffect();
    };

    function selectEmoji(e) {
        if (!e1 || (e1 && e2)) {
            e1 = e; e2 = "";
            document.getElementById('box1').innerText = e1;
            document.getElementById('box2').innerText = "?";
            document.getElementById('boxRes').innerText = "?";
            document.getElementById('inputSection').style.display = 'none';
        } else {
            e2 = e;
            document.getElementById('box2').innerText = e2;
            document.getElementById('boxRes').innerText = "🔮";
            document.getElementById('inputSection').style.display = 'block';
        }
        updateBoxEffect();
    }

    function updateBoxEffect() {
        document.getElementById('box1').classList.toggle('selected-box', !e1 || (e1 && e2));
        document.getElementById('box2').classList.toggle('selected-box', e1 && !e2);
    }

    function updateStat(id, event) {
        const bar = document.getElementById(id);
        const rect = event.currentTarget.getBoundingClientRect();
        const offsetX = event.clientX - rect.left;
        const percentage = Math.max(10, Math.min(100, (offsetX / rect.width) * 100));
        bar.style.width = percentage + "%";
    }

    function completeAlchemy() {
        document.getElementById('resEmoji').innerText = "🔮";
        document.getElementById('resDiary').innerText = document.getElementById('diaryIn').value || "오늘도 화이팅!";
        closeModal('kitchenModal');
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function changeAvatar(s) { document.getElementById('avatarBase').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${s}`; }

    function sendData() {
        const diary = document.getElementById('resDiary').innerText;
        if(diary === "오늘의 마음을 섞어주세요.") return alert("먼저 감정 연금술을 완료해주세요!");

        db.ref('room/student' + studentId).set({
            num: studentId,
            name: studentId + "번 학생",
            emoji: document.getElementById('resEmoji').innerText,
            diary: diary,
            s1: document.getElementById('s1').style.width,
            s2: document.getElementById('s2').style.width,
            status: "online"
        }).then(() => {
            alert("전송 완료! 교실로 이동합니다.");
            location.href = "classroom.html";
        }).catch(e => alert("오류 발생: " + e.message));
    }
</script>
</body>
</html>
