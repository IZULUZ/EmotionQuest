<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Princess Emotion Maker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="pm-window">
    <div class="pm-header">딸의 상태 (Status of Emotion)</div>
    
    <div class="pm-container">
        <div class="pm-side-panel">
            <h3 id="curName" style="margin:0 0 10px 0;">6-5 홍길동</h3>
            <div class="pm-char-box" id="charPreview">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="pm-char-layer" id="layerBase">
                <img src="" class="pm-char-layer" id="layerHair">
            </div>
            
            <div class="pm-stat-table">
                정서적 에너지 <div class="pm-bar-bg"><div id="barEn" class="pm-bar-fill" style="width:30%"></div></div>
                심리적 안정감 <div class="pm-bar-bg"><div id="barSt" class="pm-bar-fill" style="width:50%; background:cyan;"></div></div>
                성취감 지수 <div class="pm-bar-bg"><div id="barAch" class="pm-bar-fill" style="width:10%; background:gold;"></div></div>
            </div>

            <button class="pm-btn" style="width:100%; margin-top:20px;" onclick="openKitchen()">감정 연금술 (Mix)</button>
            <button class="pm-btn btn-config" onclick="openConfig()">⚙️ 캐릭터 커스텀</button>
        </div>

        <div class="pm-main-panel">
            <div class="pm-card" id="finalCard">
                <div style="font-size:12px; color:var(--pm-gold);">[ REAL-TIME EMOTION CARD ]</div>
                <div id="resEmoji" style="font-size:150px; text-align:center; margin:30px 0;">✨</div>
                <div id="resTags" style="color:#00aaff; font-weight:bold; font-size:20px;">#오늘의_감정</div>
                <div id="resDiary" style="color:#eee; border-top:1px solid #333; padding-top:15px;">연금술로 감정을 완성하세요...</div>
            </div>
            <button class="pm-btn" style="height:60px; font-size:22px; background:#c5a059; color:#3e2723;" onclick="sendData()">교실로 전송 및 입장하기 🚪</button>
        </div>
    </div>
</div>

<div id="kitchenModal" class="modal">
    <div class="pm-popup">
        <h2 style="text-align:center;">연금술 재료 선택</h2>
        <div class="emoji-scroll" id="pallet"></div>
        <div style="display:flex; justify-content:center; align-items:center; gap:20px; font-size:60px; margin:20px 0; background:white; padding:15px; border:4px inset #ccc;">
            <span id="f1">?</span> <span>+</span> <span id="f2">?</span> <span>=</span> <span id="fRes">?</span>
        </div>
        <div id="metaInput" style="display:none;">
            <input type="text" id="diaryIn" style="width:100%; padding:10px; font-family:inherit;" placeholder="오늘의 마음을 기록하세요.">
            <button class="pm-btn" style="width:100%; margin-top:10px;" onclick="completeMix()">합성 완료</button>
        </div>
        <button class="pm-btn" style="position:absolute; top:10px; right:10px;" onclick="closePopup('kitchenModal')">X</button>
    </div>
</div>

<div id="configModal" class="modal">
    <div class="pm-popup" style="width:400px;">
        <h2 style="text-align:center;">캐릭터 설정</h2>
        <div style="margin-bottom:20px;">
            <p>머리 모양 선택</p>
            <button class="pm-btn" onclick="setAvatar('Felix')">스타일 A</button>
            <button class="pm-btn" onclick="setAvatar('Aneka')">스타일 B</button>
            <button class="pm-btn" onclick="setAvatar('Mia')">스타일 C</button>
        </div>
        <button class="pm-btn" style="width:100%;" onclick="closePopup('configModal')">저장</button>
    </div>
</div>

<script>
    const firebaseConfig = { /* Firebase 정보 */ };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let s1 = "", s2 = "", curId = 1;
    // 50개 이상의 이모지 데이터
    const emojiList = ["😊","😆","🥰","😎","🥳","😌","☁️","🍵","🌱","🌊","💢","😡","😢","😫","🔥","🌈","✨","💎","🧡","💥","⭐","🍀","🎈","🎨","🍕","🍦","🍭","🎮","🎸","⚽","🐶","🐱","🦄","🚀","🌙","🪐","🌸","🌻","🍭","🍩","🥨","🍿","🧊","🎧","🎬","🧸","🧁","🥂","🧩","💌"];

    function init() {
        const p = document.getElementById('pallet');
        emojiList.forEach(e => {
            const b = document.createElement('button'); b.className='pm-btn'; b.style.fontSize='30px'; b.innerText=e;
            b.onclick=()=>pickEmoji(e); p.appendChild(b);
        });
    }

    function openKitchen() { document.getElementById('kitchenModal').style.display='flex'; }
    function openConfig() { document.getElementById('configModal').style.display='flex'; }
    function closePopup(id) { document.getElementById(id).style.display='none'; }

    // 이모지 로직 수정: 2개 선택 후 다시 고르면 첫번째부터
    function pickEmoji(e) {
        if (!s1 || (s1 && s2)) { // 처음이거나 이미 두개가 다 차있으면 리셋 후 첫번째에 넣기
            s1 = e; s2 = "";
            document.getElementById('f1').innerText = s1;
            document.getElementById('f2').innerText = "?";
            document.getElementById('fRes').innerText = "?";
            document.getElementById('metaInput').style.display = 'none';
        } else { // 첫번째는 있는데 두번째가 없으면 두번째에 넣기
            s2 = e;
            document.getElementById('f2').innerText = s2;
            document.getElementById('fRes').innerText = "🔮";
            document.getElementById('metaInput').style.display = 'block';
        }
    }

    function setAvatar(seed) {
        document.getElementById('layerBase').src = `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}`;
    }

    function completeMix() {
        document.getElementById('resEmoji').innerText = "🔮";
        document.getElementById('resDiary').innerText = document.getElementById('diaryIn').value;
        closePopup('kitchenModal');
    }

    function sendData() {
        database.ref('room/student' + curId).set({
            num: curId, name: "홍길동",
            emoji: document.getElementById('resEmoji').innerText,
            diary: document.getElementById('resDiary').innerText,
            status: "online"
        }).then(() => {
            alert("전송 완료! 교실로 이동합니다.");
            location.href = "classroom.html"; // 자동 이동
        });
    }
    init();
</script>
</body>
</html>
