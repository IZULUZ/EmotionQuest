<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오늘의 감정일기</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); }
        :root { --main-bg: #fdf5e6; --dark: #2d1b15; --gold: #e6b31e; }
        body { margin: 0; background: #121212; font-family: 'DungGeunMo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .window { width: 1000px; height: 800px; background: var(--main-bg); border: 12px ridge var(--dark); display: flex; flex-direction: column; position: relative; }
        .header { background: var(--dark); color: var(--gold); padding: 15px; text-align: center; font-size: 26px; border-bottom: 5px double var(--gold); }
        .content { display: flex; flex: 1; padding: 25px; gap: 25px; overflow: hidden; }
        
        /* 3D 움직이는 캐릭터 영역 */
        .char-section { width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .char-frame { width: 100%; height: 400px; background: white; border: 4px inset var(--dark); display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .char-3d { width: 100%; height: 100%; object-fit: contain; }

        .advice-box { background: white; border: 3px inset #333; padding: 15px; flex: 1; font-size: 20px; line-height: 1.6; overflow-y: auto; }
        .main-panel { flex: 1; background: #1a1a1a; border: 4px double var(--gold); border-radius: 20px; display: flex; flex-direction: column; align-items: center; padding: 20px; color: white; }
        
        /* 이모지 그리드 및 스크롤 */
        .emoji-scroll-box { width: 100%; height: 250px; overflow-y: scroll; background: #fff; border: 4px inset #333; padding: 10px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin: 15px 0; }
        .emoji-item { font-size: 40px; cursor: pointer; text-align: center; transition: transform 0.2s; }
        .emoji-item:hover { transform: scale(1.2); }

        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 15px 0; }
        .tag-btn { background: #333; border: 1px solid var(--gold); color: white; padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 14px; }
        .tag-btn.selected { background: var(--gold); color: black; font-weight: bold; }
        .pm-btn { background: var(--dark); color: var(--gold); border: 4px outset var(--gold); padding: 12px 20px; cursor: pointer; font-family: inherit; font-size: 18px; width: 100%; }
        .pm-btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="window">
    <div class="header">📔 오늘의 감정일기 (6-5)</div>
    <div class="content">
        <div class="char-section">
            <div class="char-frame">
                <img id="charImg" src="" class="char-3d">
            </div>
            <div class="advice-box" id="adviceArea">
                <b style="color: #d32f2f;">[분석 조언]</b><br>
                <span id="adviceText">마음을 표현할 이모지를 선택해주세요.</span>
            </div>
        </div>

        <div class="main-panel">
            <div style="font-size: 14px; color: var(--gold);">▼ 이모지를 2개 선택하세요 (스크롤 가능)</div>
            <div class="emoji-scroll-box" id="emojiGrid"></div>
            
            <div style="font-size:30px; margin: 10px 0;">
                <span id="s1">❓</span> + <span id="s2">❓</span>
            </div>

            <div class="tag-container" id="tagList"></div>
            <input type="text" id="diaryInput" placeholder="오늘의 짧은 기록..." style="width:90%; background:none; border:none; border-bottom:2px solid #555; color:white; text-align:center; font-family:inherit; font-size:18px; padding:10px;">

            <div style="margin-top:auto; width:100%;">
                <button id="entryBtn" class="pm-btn" disabled onclick="enterClass()">감정 카드 생성 및 입장</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Firebase 설정 (제시해주신 설정값 적용)
    const firebaseConfig = { apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8", authDomain: "secret-quest-class.firebaseapp.com", databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/", projectId: "secret-quest-class", storageBucket: "secret-quest-class.firebasestorage.app", messagingSenderId: "397245266210", appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    const sNum = prompt("출석 번호를 입력하세요", "1");
    // 움직이는 3D 캐릭터 (1번 남성, 2번 여성 스타일 GIF)
    const charUrl = (parseInt(sNum) % 2 === 1) 
        ? "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ3bmZueGZ3bmZueGZ3&ep=v1_gifs_search&rid=giphy.gif&ct=g" // 예시 캐릭터 1
        : "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJueGZ3bmZueGZ3bmZueGZ3&ep=v1_gifs_search&rid=giphy.gif&ct=g"; // 예시 캐릭터 2
    document.getElementById('charImg').src = charUrl;

    // 32개 이모지 리스트
    const emojis = ["😊","😡","😢","🥰","🤔","🥳","😎","😴","🔥","🌈","🤢","😱","🤩","😭","🫠","😶‍🌫️","🤯","🥺","🤤","👺","👾","👻","💀","🤡","🤖","🎃","⭐","🌙","🍀","💎","🦄","🎨"];
    let slot1 = null, slot2 = null, selectedTags = [];
    const emotionWords = ["설렘", "뿌듯", "걱정", "당당", "평온", "신남", "짜증", "슬픔", "몽글몽글", "피곤", "자신감", "행복"];

    const grid = document.getElementById('emojiGrid');
    emojis.forEach(e => {
        let div = document.createElement('div'); div.className = 'emoji-item'; div.innerText = e;
        div.onclick = () => {
            if(!slot1 || (slot1 && slot2)) { slot1=e; slot2=null; document.getElementById('s1').innerText=e; document.getElementById('s2').innerText="❓"; }
            else { slot2=e; document.getElementById('s2').innerText=e; checkReady(); }
        };
        grid.appendChild(div);
    });

    const tl = document.getElementById('tagList');
    emotionWords.forEach(w => {
        let b = document.createElement('div'); b.className='tag-btn'; b.innerText=w;
        b.onclick = () => {
            if(b.classList.contains('selected')) { b.classList.remove('selected'); selectedTags = selectedTags.filter(t=>t!==w); }
            else if(selectedTags.length < 3) { b.classList.add('selected'); selectedTags.push(w); }
            checkReady();
        };
        tl.appendChild(b);
    });

    function checkReady() {
        if(slot1 && slot2 && selectedTags.length >= 2) {
            document.getElementById('entryBtn').disabled = false;
            document.getElementById('adviceText').innerText = "멋진 감정 조합이네요! 오늘의 일기를 작성하고 입장하세요.";
        }
    }

    function enterClass() {
        const emojiUrl = `https://www.gstatic.com/android/keyboard/emojikitchen/20201001/u${slot1.codePointAt(0).toString(16)}/u${slot1.codePointAt(0).toString(16)}_u${slot2.codePointAt(0).toString(16)}.png`;
        db.ref(`room/student${sNum}`).set({
            num: sNum, name: sNum+"번 학생", emojiImg: emojiUrl, 
            gender: (parseInt(sNum)%2===1?'male':'female'), tags: selectedTags, 
            diary: document.getElementById('diaryInput').value, status: "online", 
            gems: {respect:0, care:0, love:0}
        });
        location.href = `classroom.html?num=${sNum}`;
    }
</script>
</body>
</html>
