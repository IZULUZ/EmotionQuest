<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 감정 연금술소</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); }
        :root { --pm-bg: #fdf5e6; --pm-dark: #2d1b15; --pm-gold: #e6b31e; --pm-inner: #fff9eb; }
        body { margin: 0; background: #121212; font-family: 'DungGeunMo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .window { width: 1000px; height: 750px; background: var(--pm-bg); border: 12px ridge var(--pm-dark); outline: 4px solid var(--pm-gold); display: flex; flex-direction: column; position: relative; }
        .header { background: var(--pm-dark); color: var(--pm-gold); padding: 12px; text-align: center; font-size: 24px; border-bottom: 5px double var(--pm-gold); }
        
        /* 단계별 섹션 제어 */
        .step { display: none; flex: 1; padding: 30px; flex-direction: column; align-items: center; }
        .step.active { display: flex; }

        /* UI 컴포넌트 */
        .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; height: 180px; overflow-y: auto; background: white; padding: 15px; border: 4px inset #333; width: 80%; }
        .emoji-item { font-size: 35px; cursor: pointer; transition: 0.1s; }
        .emoji-item:hover { transform: scale(1.2); }
        
        .mix-container { display: flex; align-items: center; gap: 20px; margin: 20px 0; background: #fff; padding: 15px; border-radius: 10px; border: 3px solid var(--pm-dark); }
        .mix-slot { width: 100px; height: 100px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin: 15px 0; }
        .tag { background: #eee; border: 2px solid #333; padding: 8px 15px; cursor: pointer; }
        .tag.on { background: var(--pm-dark); color: white; }

        .pm-btn { background: var(--pm-dark); color: var(--pm-gold); border: 5px outset var(--pm-gold); padding: 15px 30px; cursor: pointer; font-family: inherit; font-size: 20px; }
        .pm-btn:active { border-style: inset; }

        canvas { background: white; border: 3px solid var(--pm-dark); padding: 10px; }
        .q-card { background: white; border: 3px solid var(--pm-dark); padding: 15px; width: 250px; cursor: pointer; text-align: center; }
        .q-card.selected { background: var(--pm-gold); }
    </style>
</head>
<body>

<div class="window">
    <div class="header">📔 감정 연금술 페이지 (6-5)</div>

    <div id="step1" class="step active">
        <h2>1. 감정 재료를 섞으세요</h2>
        <div class="emoji-grid" id="grid"></div>
        <div class="mix-container">
            <div class="mix-slot" id="s1">?</div>
            <div style="font-size: 40px;">+</div>
            <div class="mix-slot" id="s2">?</div>
            <div style="font-size: 40px;">=</div>
            <div class="mix-slot" id="resImg">?</div>
        </div>
        <div class="tag-container" id="tagList"></div>
        <input type="text" id="diary" placeholder="오늘의 일기를 한 줄로 기록하세요" style="width: 70%; padding: 12px; font-family: inherit; margin-bottom: 20px;">
        <button class="pm-btn" onclick="goStep2()">감정 분석하기 ✨</button>
    </div>

    <div id="step2" class="step">
        <h2>2. 당신의 감정 분석 & 퀘스트</h2>
        <div style="display: flex; gap: 40px; width: 100%; justify-content: center; align-items: center;">
            <div style="width: 350px; height: 350px;"><canvas id="emotionChart"></canvas></div>
            <div style="flex: 1; text-align: left;">
                <div id="adviceBox" style="background: white; border: 3px inset #333; padding: 15px; margin-bottom: 20px; font-size: 18px; color: #111;"></div>
                <h3>맞춤 퀘스트 선택</h3>
                <div id="questChoices" style="display: flex; gap: 10px;"></div>
            </div>
        </div>
        <button class="pm-btn" id="finBtn" disabled onclick="submitAll()" style="margin-top: 30px;">최종 입장하기 🚪</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8", authDomain: "secret-quest-class.firebaseapp.com", databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/", projectId: "secret-quest-class", storageBucket: "secret-quest-class.firebasestorage.app", messagingSenderId: "397245266210", appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    const emojis = ["😊","😡","😢","🥰","🤔","🥳","😎","😴","🔥","🌈","🤢","😱","🤩","😭","🫠","🤯","🥺","🤤","👾","👻","💀","🤖","🎃","⭐","🌙","🍀","💎","🎨","🎮","⚽","🍎","🌈"];
    const tagsArr = ["기쁨", "설렘", "분노", "우울", "긴장", "평온", "피곤", "자신감"];
    let sel1=null, sel2=null, finalImg="", selectedTags=[], selectedQuest=null;

    // 1단계 세팅
    const g = document.getElementById('grid');
    emojis.forEach(e => {
        let d = document.createElement('div'); d.className='emoji-item'; d.innerText=e;
        d.onclick = () => {
            if(!sel1 || (sel1 && sel2)) { sel1=e; sel2=null; document.getElementById('s1').innerText=e; document.getElementById('s2').innerText="?"; document.getElementById('resImg').innerHTML="?"; }
            else { sel2=e; document.getElementById('s2').innerText=e; updateMix(); }
        };
        g.appendChild(d);
    });

    const tL = document.getElementById('tagList');
    tagsArr.forEach(t => {
        let s = document.createElement('span'); s.className='tag'; s.innerText=t;
        s.onclick = () => {
            if(s.classList.contains('on')){ s.classList.remove('on'); selectedTags = selectedTags.filter(i=>i!==t); }
            else if(selectedTags.length < 2){ s.classList.add('on'); selectedTags.push(t); }
        };
        tL.appendChild(s);
    });

    function updateMix() {
        const u1 = sel1.codePointAt(0).toString(16); const u2 = sel2.codePointAt(0).toString(16);
        finalImg = `https://www.gstatic.com/android/keyboard/emojikitchen/20201001/u${u1}/u${u1}_u${u2}.png`;
        document.getElementById('resImg').innerHTML = `<img src="${finalImg}" style="width:100%" onerror="this.innerHTML='✨'">`;
    }

    // 2단계 분석 로직
    function goStep2() {
        if(!sel1 || !sel2 || selectedTags.length === 0) return alert("이모지와 태그를 모두 선택하세요!");
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        
        // 육각형 차트 생성
        const ctx = document.getElementById('emotionChart').getContext('2d');
        const labels = ["배려", "존중", "성실", "용기", "절제", "사랑"];
        const dataValues = labels.map(() => Math.floor(Math.random() * 50) + 50);

        new Chart(ctx, {
            type: 'radar',
            data: { labels, datasets: [{ label: '내 마음 에너지', data: dataValues, backgroundColor: 'rgba(230, 179, 30, 0.4)', borderColor: 'rgba(230, 179, 30, 1)', borderWidth: 3 }] },
            options: { scales: { r: { min: 0, max: 100, ticks: { display: false } } } }
        });

        // 퀘스트 추천
        const advice = (selectedTags.includes("분노") || selectedTags.includes("피곤")) 
            ? "오늘 마음의 온도가 높거나 낮네요. '배려'의 행동으로 에너지를 정화해보세요."
            : "아주 좋은 기운입니다! '사랑' 혹은 '존중' 퀘스트를 통해 에너지를 나눠보세요.";
        document.getElementById('adviceBox').innerText = advice;

        const qContainer = document.getElementById('questChoices');
        qContainer.innerHTML = "";
        const types = ["배려", "존중", "사랑"];
        types.forEach(type => {
            let card = document.createElement('div'); card.className='q-card';
            card.innerHTML = `<strong>[${type}]</strong><br>주변의 쓰레기를 줍거나 친구에게 인사하기`;
            card.onclick = () => {
                document.querySelectorAll('.q-card').forEach(x=>x.classList.remove('selected'));
                card.classList.add('selected'); selectedQuest = {title: card.innerText, type: type};
                document.getElementById('finBtn').disabled = false;
            };
            qContainer.appendChild(card);
        });
    }

    function submitAll() {
        const n = prompt("번호 입력(1~23)", "1") || "1";
        const charImg = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/versions/generation-v/black-white/animated/${n}.gif`;
        db.ref(`room/student${n}`).set({ num:n, emojiImg:finalImg, charImg:charImg, diary:document.getElementById('diary').value, status:'online', gems:{배려:0,존중:0,사랑:0} });
        db.ref(`room/student${n}/myQuests`).push(selectedQuest).then(() => location.href=`classroom.html?num=${n}`);
    }
</script>
</body>
</html>
