<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6학년 5반 감정 시뮬레이션</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="game-window">
    <div class="window-header">
        <span>EMOTION MAKER: 6-5 CLASS</span>
        <span id="dateDisplay">2026.02.27</span>
    </div>

    <div class="main-ui">
        <div class="left-panel">
            <div class="char-frame">
                <img id="charAvatar" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Man%20Standing.png" width="130">
            </div>
            <div class="status-window">
                <div class="stat-row">의욕(에너지) <div class="gauge-bg"><div id="bar-en" class="gauge-fill" style="background: #ff4757;"></div></div></div>
                <div class="stat-row">안정(회복력) <div class="gauge-bg"><div id="bar-re" class="gauge-fill" style="background: #2ed573;"></div></div></div>
                <div class="stat-row">감성(민감도) <div class="gauge-bg"><div id="bar-se" class="gauge-fill" style="background: #1e90ff;"></div></div></div>
            </div>
        </div>

        <div class="right-panel">
            <h3>[ 오늘 나의 마음 선택 ]</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="pixel-btn" onclick="analyze('happy')">🤩 행복/기쁨</button>
                <button class="pixel-btn" onclick="analyze('calm')">😌 평온/차분</button>
                <button class="pixel-btn" onclick="analyze('tired')">😴 피곤/무기력</button>
                <button class="pixel-btn" onclick="analyze('angry')">💢 짜증/화남</button>
            </div>

            <div id="resultArea" style="display:none; margin-top:20px;">
                <div class="mission-board">
                    <strong>오늘의 감정 퀘스트:</strong><br>
                    <span id="questText">아이콘을 선택하면 퀘스트가 생성됩니다.</span>
                </div>
                <textarea id="diary" style="width:100%; height:70px; margin-top:10px; font-family:inherit; padding:10px; box-sizing:border-box;" placeholder="이 마음이 드는 구체적인 이유는 무엇인가요?"></textarea>
                <button class="pixel-btn" style="background: #ffeaa7; margin-top:10px;" onclick="sendToClass()">교실로 전송하고 입장하기</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
        authDomain: "secret-quest-class.firebaseapp.com",
        databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/",
        projectId: "secret-quest-class",
        storageBucket: "secret-quest-class.firebasestorage.app",
        messagingSenderId: "397245266210",
        appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentStats = { en: 20, re: 20, se: 20 };
    let selectedEmoji = "✨";

    function analyze(type) {
        document.getElementById('resultArea').style.display = 'block';
        const q = document.getElementById('questText');
        
        if(type === 'happy') {
            currentStats = { en: 90, re: 60, se: 30 };
            selectedEmoji = "🤩";
            q.innerText = "친구에게 기분 좋은 칭찬 한 마디 건네기!";
        } else if(type === 'calm') {
            currentStats = { en: 40, re: 95, se: 20 };
            selectedEmoji = "😌";
            q.innerText = "오늘 공부할 내용을 차분히 1분간 훑어보기";
        } else if(type === 'tired') {
            currentStats = { en: 10, re: 30, se: 60 };
            selectedEmoji = "😴";
            q.innerText = "자리에서 일어나 가벼운 스트레칭 3회 하기";
        } else if(type === 'angry') {
            currentStats = { en: 80, re: 10, se: 90 };
            selectedEmoji = "💢";
            q.innerText = "심호흡을 크게 3번 하고 시원한 물 한 잔 마시기";
        }

        updateBars();
    }

    function updateBars() {
        document.getElementById('bar-en').style.width = currentStats.en + "%";
        document.getElementById('bar-re').style.width = currentStats.re + "%";
        document.getElementById('bar-se').style.width = currentStats.se + "%";
    }

    function sendToClass() {
        const diary = document.getElementById('diary').value;
        database.ref('room/student1').set({
            name: "1번 학생", num: 1, emoji: selectedEmoji, 
            stats: currentStats, diary: diary, status: "online"
        }).then(() => {
            alert("교실로 데이터가 전송되었습니다!");
            location.href = "classroom.html";
        });
    }
</script>
</body>
</html>
