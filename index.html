<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 감정 연금술소</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); }
        :root { --pm-dark: #3e2723; --pm-gold: #c5a059; --pm-bg: #fdf5e6; }
        body { margin: 0; background: #1a1a1a; font-family: 'DungGeunMo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .pm-window { width: 950px; height: 700px; background: var(--pm-bg); border: 12px ridge var(--pm-dark); display: flex; flex-direction: column; position: relative; }
        .pm-header { background: #3e2723; color: var(--pm-gold); padding: 10px; text-align: center; font-size: 20px; border-bottom: 4px double var(--pm-gold); }
        .content { display: flex; flex: 1; padding: 20px; gap: 20px; }
        .side { width: 280px; display: flex; flex-direction: column; gap: 10px; }
        .avatar-frame { width: 100%; height: 220px; background: white; border: 4px inset var(--pm-dark); display: flex; justify-content: center; align-items: center; }
        .main-card { flex: 1; background: #000; border: 4px double var(--pm-gold); border-radius: 15px; display: flex; flex-direction: column; align-items: center; padding: 15px; color: white; }
        .pm-btn { background: var(--pm-dark); color: var(--pm-gold); border: 4px outset var(--pm-gold); padding: 8px; cursor: pointer; font-family: inherit; }
        .pm-btn:disabled { opacity: 0.5; }
        .emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: white; padding: 10px; border: 3px inset #ccc; }
        .emoji-item { font-size: 24px; cursor: pointer; }
        .quest-box { width: 90%; background: #222; border: 1px solid var(--pm-gold); padding: 8px; margin: 4px 0; cursor: pointer; font-size: 13px; text-align: center; color: #ccc; }
        .quest-box.selected { background: var(--pm-gold); color: black; font-weight: bold; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center; }
        .modal-inner { background: var(--pm-bg); border: 8px ridge var(--pm-dark); padding: 20px; width: 400px; text-align: center; }
        /* 교사용 입장 비밀 버튼 */
        #adminAccess { position: absolute; top: 0; right: 0; width: 50px; height: 50px; cursor: default; z-index: 10; }
    </style>
</head>
<body>

<div class="pm-window">
    <div id="adminAccess" onclick="goAdmin()"></div>
    
    <div class="pm-header">6-5 EMOTION ALCHEMY CENTER</div>
    <div class="content">
        <div class="side">
            <div class="avatar-frame"><img id="avatarImg" src="" style="width:100%"></div>
            <button class="pm-btn" onclick="openModal('customModal')">👗 캐릭터 커스텀</button>
            <div id="adviceBox" style="background:#fff; border:2px inset #3e2723; padding:12px; flex:1; font-size:12px; color:#3e2723;">
                <b>◈ 분석 조언</b><br><br><span id="adviceText">이모지를 합성해주세요.</span>
            </div>
        </div>
        <div class="main-card">
            <div id="mixResult" style="width:120px; height:120px; background:#111; display:flex; align-items:center; justify-content:center; border-radius:10px; margin-bottom:10px;">
                <span id="wait">?</span><img id="mixImg" src="" style="width:100%; display:none;">
            </div>
            <div id="resTag" style="color:var(--pm-gold); font-size:18px; font-weight:bold;">#대기중</div>
            <input type="text" id="diaryIn" style="width:80%; background:transparent; border:none; border-bottom:1px solid #444; color:white; text-align:center; font-family:inherit; margin:10px 0;" placeholder="지금 마음은?">
            
            <div id="questSection" style="display:none; width:100%;">
                <div style="font-size:11px; color:gold; text-align:center;">▼ 퀘스트 선택</div>
                <div id="questList" style="display:flex; flex-direction:column; align-items:center;"></div>
            </div>

            <div style="margin-top:auto; display:flex; gap:10px; width:100%;">
                <button class="pm-btn" style="flex:1" onclick="openModal('mixModal')">🔮 이모지 합성</button>
                <button id="entryBtn" class="pm-btn" style="flex:1; background:var(--pm-gold); color:black;" disabled onclick="submitAndEnter()">제출 후 입장</button>
            </div>
        </div>
    </div>
</div>

<div id="mixModal" class="modal"><div class="modal-inner">
    <h3>이모지 선택</h3>
    <div class="emoji-grid" id="emojiGrid"></div>
    <div style="font-size:30px; margin:10px;"><span id="e1">?</span> + <span id="e2">?</span></div>
    <button class="pm-btn" onclick="mix()">합성!</button>
</div></div>

<div id="customModal" class="modal"><div class="modal-inner">
    <h3>스타일</h3>
    <button class="pm-btn" onclick="setAvatar('adventurer')">모험가</button>
    <button class="pm-btn" onclick="setAvatar('bottts')">로봇</button>
    <button class="pm-btn" onclick="closeModal('customModal')">닫기</button>
</div></div>

<script>
    // Firebase 설정
    const firebaseConfig = { apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8", authDomain: "secret-quest-class.firebaseapp.com", databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/", projectId: "secret-quest-class", storageBucket: "secret-quest-class.firebasestorage.app", messagingSenderId: "397245266210", appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    let sNum = prompt("번호(1-23)", "1");
    let sName = sNum + "번 학생";
    let slot1 = null, slot2 = null, finalUrl = "", selectedQ = "";

    const emojiData = [{e:"😊", c:"1f60a"}, {e:"😡", c:"1f621"}, {e:"😢", c:"1f622"}, {e:"🥰", c:"1f970"}, {e:"🔥", c:"1f525"}];

    function init() {
        setAvatar('adventurer');
        const grid = document.getElementById('emojiGrid');
        emojiData.forEach(i => {
            let d = document.createElement('div'); d.className='emoji-item'; d.innerText=i.e;
            d.onclick = () => { if(!slot1 || (slot1 && slot2)) { slot1=i; slot2=null; document.getElementById('e1').innerText=i.e; } else { slot2=i; document.getElementById('e2').innerText=i.e; } };
            grid.appendChild(d);
        });
    }

    function mix() {
        if(!slot1 || !slot2) return;
        closeModal('mixModal');
        finalUrl = `https://www.gstatic.com/android/keyboard/emojikitchen/20201001/u${slot1.c}/u${slot1.c}_u${slot2.c}.png`;
        document.getElementById('mixImg').src = finalUrl;
        document.getElementById('mixImg').style.display = 'block';
        document.getElementById('wait').style.display = 'none';
        
        // 퀘스트 생성 로직
        document.getElementById('questSection').style.display = 'block';
        const ql = document.getElementById('questList'); ql.innerHTML = "";
        ["친구 돕기", "명상하기", "교실 정리"].forEach(q => {
            let b = document.createElement('div'); b.className='quest-box'; b.innerText=q;
            b.onclick = () => { document.querySelectorAll('.quest-box').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); selectedQ=q; document.getElementById('entryBtn').disabled=false; };
            ql.appendChild(b);
        });
    }

    function setAvatar(s) { document.getElementById('avatarImg').src = `https://api.dicebear.com/7.x/${s}/svg?seed=${sNum}`; }
    function submitAndEnter() {
        db.ref(`room/student${sNum}`).set({
            num: sNum, name: sName, emojiImg: finalUrl, status: "online", gems: 0, tag: "#감정생성", diary: document.getElementById('diaryIn').value
        });
        db.ref(`room/student${sNum}/quests`).push({ title: "[감정] " + selectedQ });
        location.href = `classroom.html?num=${sNum}`;
    }
    function goAdmin() { if(prompt("암호")==="6500") location.href="admin.html"; }
    function openModal(id) { document.getElementById(id).style.display='flex'; }
    function closeModal(id) { document.getElementById(id).style.display='none'; }
    init();
</script>
</body>
</html>
