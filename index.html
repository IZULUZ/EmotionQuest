<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Emotion Maker 6-5</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="app-window">
    <div class="nav-bar">
        <span style="font-size:24px;">Emotion Class</span>
        <div class="gender-btns">
            <button onclick="setStudent(1)">♂️ 1번 남학생</button>
            <button onclick="setStudent(2)">♀️ 2번 여학생</button>
        </div>
    </div>

    <div class="main-content">
        <div class="char-section">
            <h2 id="stLabel" style="font-size:30px; margin-bottom:10px;">1번 홍길동</h2>
            <img id="mainChar" src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Man%20Standing.png" class="stickman">
            <button class="btn-main" onclick="openPopup()">오늘의 감정 고르기</button>
        </div>

        <div class="card-section">
            <div class="emotion-card">
                <div style="text-align:right; font-size:12px; margin-bottom:10px;">2월 27일 감정 기록</div>
                <div class="card-img" id="cardResult">✨</div>
                <div style="margin-top:20px;">
                    <div id="cardTags" style="color:#3897f0; font-weight:bold; margin-bottom:8px;">#감정분석전</div>
                    <div id="cardDiary" style="font-size:14px; color:#aaa; line-height:1.4;">마음을 완성하면 기록됩니다.</div>
                    <div id="cardQuest" style="margin-top:10px; font-size:12px; color:#ffd700; border-top:1px solid #333; padding-top:5px;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="kitchenModal" class="modal">
    <div class="kitchen-popup">
        <h2 style="text-align:center;">Emoji Kitchen 👨‍🍳</h2>
        <div class="emoji-pallet" id="pallet"></div>
        
        <div style="display:flex; justify-content:center; align-items:center; gap:20px; font-size:40px; margin:20px 0; background:#f9f9f9; padding:10px; border-radius:50px;">
            <span id="s1">?</span> + <span id="s2">?</span> = <span id="sRes">?</span>
        </div>

        <div id="step2" style="display:none;">
            <strong>감정 태그 (최대 3개):</strong>
            <div id="tagPallet" style="display:flex; flex-wrap:wrap; gap:5px; margin:10px 0;"></div>
            
            <strong>한 줄 감정 일기:</strong>
            <textarea id="diaryIn" style="width:100%; height:50px; margin-top:5px;" placeholder="오늘의 마음을 한 줄로 적어보세요." oninput="syncCard()"></textarea>

            <div class="quest-box" id="questZone">
                <strong>[나를 위한 감정 미션 선택]</strong>
                <div id="questOptions"></div>
            </div>

            <button class="btn-main" style="width:100%; background:#ffd700; margin-top:20px;" onclick="sendToFirebase()">교실 전송하기</button>
        </div>
        <button style="position:absolute; top:15px; right:15px; border:none; background:none; font-size:20px; cursor:pointer;" onclick="closePopup()">X</button>
    </div>
</div>

<script>
    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
        authDomain: "secret-quest-class.firebaseapp.com",
        databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/",
        projectId: "secret-quest-class",
        storageBucket: "secret-quest-class.firebasestorage.app",
        messagingSenderId: "397245266210",
        appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let curId = 1, e1 = "", e2 = "", selTags = [], selQuest = "";
    const emojiData = ["😊","🥰","😎","🥳","😌","☁️","🍵","🌱","💢","😡","😢","😫","🔥","🌈","✨","🌊"];
    const tagData = ["#설렘", "#행복", "#편안함", "#기운참", "#뿌듯함", "#속상함", "#짜증", "#피곤함"];

    function init() {
        const pal = document.getElementById('pallet');
        emojiData.forEach(e => {
            const b = document.createElement('button'); b.className='emoji-item'; b.innerText=e;
            b.onclick=()=>pick(e); pal.appendChild(b);
        });
        const tPal = document.getElementById('tagPallet');
        tagData.forEach(t => {
            const b = document.createElement('button'); b.className='btn-p'; b.style.fontSize='12px'; b.innerText=t; b.style.padding='5px 10px';
            b.onclick=()=>tagPick(t, b); tPal.appendChild(b);
        });
    }

    function setStudent(id) {
        curId = id;
        document.getElementById('stLabel').innerText = id === 1 ? "1번 홍길동" : "2번 김지수";
        document.getElementById('mainChar').src = id === 1 
            ? "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Man%20Standing.png"
            : "https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/People/Woman%20Standing.png";
    }

    function openPopup() { document.getElementById('kitchenModal').style.display='flex'; }
    function closePopup() { document.getElementById('kitchenModal').style.display='none'; }

    function pick(e) {
        if(!e1) { e1=e; document.getElementById('s1').innerText=e; }
        else { 
            e2=e; document.getElementById('s2').innerText=e;
            document.getElementById('sRes').innerText = "🔮"; // 가상 결과
            document.getElementById('cardResult').innerText = "🔮";
            document.getElementById('step2').style.display = 'block';
            generateQuests(e);
        }
    }

    function tagPick(t, b) {
        if(selTags.includes(t)) { selTags=selTags.filter(i=>i!==t); b.style.background='white'; }
        else if(selTags.length<3) { selTags.push(t); b.style.background='#ffd700'; }
        syncCard();
    }

    function generateQuests(e) {
        const qZone = document.getElementById('questOptions');
        qZone.innerHTML = "";
        let opts = ["친구에게 인사하기", "심호흡 3번 하기", "오늘 목표 1개 세우기"];
        if(e === "💢" || e === "😡") opts = ["찬물 마시기", "10부터 거꾸로 세기", "자리 정돈하기"];
        
        opts.forEach(o => {
            const d = document.createElement('div'); d.className='quest-opt'; d.innerText=o;
            d.onclick=()=>{
                Array.from(qZone.children).forEach(c=>c.classList.remove('selected'));
                d.classList.add('selected'); selQuest = o; syncCard();
            };
            qZone.appendChild(d);
        });
    }

    function syncCard() {
        document.getElementById('cardTags').innerText = selTags.join(' ');
        document.getElementById('cardDiary').innerText = document.getElementById('diaryIn').value;
        document.getElementById('cardQuest').innerText = selQuest ? "🎯 미션: " + selQuest : "";
    }

    function sendToFirebase() {
        if(!selQuest) return alert("미션을 선택해주세요!");
        database.ref('room/student' + curId).set({
            name: curId === 1 ? "홍길동" : "김지수", num: curId,
            emoji: document.getElementById('cardResult').innerText,
            tags: selTags.join(' '), diary: document.getElementById('diaryIn').value,
            quest: selQuest, status: "online"
        }).then(() => { alert("전송 완료!"); closePopup(); });
    }
    init();
</script>
</body>
</html>
