<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Emotion Class 6-5</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h1 style="margin:0; font-size:40px;">Emotion class</h1>
        <div class="student-toggle">
            <button class="btn-p" onclick="changeStudent(1)">1번 남학생</button>
            <button class="btn-p" onclick="changeStudent(2)" style="background:#a2d2ff;">2번 여학생</button>
        </div>
    </div>

    <div class="content-area">
        <div class="profile-section">
            <h2 id="stName" style="font-size:35px;">1번 홍길동</h2>
            <div id="stChar" class="char-display">🧍</div>
            <button class="btn-p" style="width:100%;" onclick="openKitchen()">감정 고르기</button>
        </div>

        <div class="mission-board">
            <h3 style="font-size:24px;">오늘의 감정 미션</h3>
            <div id="missionList" style="text-align:left; padding:20px; line-height:2.5; font-size:18px;">
                ◽ 감정 이모지 믹스하기<br>
                ◽ 구체적인 이유 적어보기<br>
                ◽ 나에게 어울리는 태그 달기<br>
                ◽ 교실로 카드 전송하기
            </div>
        </div>

        <div class="card-preview" id="finalCard">
            <div style="text-align:right; font-size:12px; margin-bottom:10px;">2월 27일 감정 기록</div>
            <div class="card-inner-img" id="cardEmoji">✨</div>
            <div style="margin-top:20px;">
                <div id="cardTags" style="color:#3897f0; font-weight:bold; margin-bottom:10px;">#키워드분석</div>
                <div id="cardDiary" style="font-size:15px; color:#ccc;">내용을 입력하면 기록됩니다.</div>
            </div>
        </div>
    </div>
</div>

<div id="kitchenModal" class="modal">
    <div class="kitchen-window">
        <h2 style="text-align:center; margin-top:0;">Emoji Kitchen 👨‍🍳</h2>
        <div class="emoji-grid" id="emojiPallet"></div>
        
        <div class="formula">
            <span id="slot1">?</span> + <span id="slot2">?</span> = <span id="resSlot">?</span>
        </div>

        <div id="metaInput" style="display:none;">
            <div id="tagBox" style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:15px;"></div>
            <textarea id="diaryInput" style="width:100%; height:60px; border-radius:10px; padding:10px;" placeholder="오늘의 마음을 한 줄로 표현해볼까요?"></textarea>
            <button class="btn-p" style="width:100%; margin-top:15px; background:#ffd700;" onclick="completeEmotion()">감정 입력하기</button>
        </div>
        <button class="btn-p" style="position:absolute; top:15px; right:15px; background:#eee;" onclick="closeKitchen()">X</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
        authDomain: "secret-quest-class.firebaseapp.com",
        databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/",
        projectId: "secret-quest-class",
        storageBucket: "secret-quest-class.firebasestorage.app",
        messagingSenderId: "397245266210",
        appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let curId = 1, s1 = "", s2 = "", tags = [];
    const emojiList = ["😊","😆","🥰","😎","🥳","😌","☁️","🍵","🌱","🌊","💢","😡","😢","😫","🔥","🌈","✨","💎","🧡","💥"];
    const tagList = ["#설렘", "#행복", "#편안함", "#자신감", "#뿌듯함", "#속상함", "#짜증", "#위로필요"];

    function init() {
        const p = document.getElementById('emojiPallet');
        emojiList.forEach(e => {
            const b = document.createElement('button'); b.className='emoji-btn'; b.innerText=e;
            b.onclick=()=>pickEmoji(e); p.appendChild(b);
        });
        const tb = document.getElementById('tagBox');
        tagList.forEach(t => {
            const b = document.createElement('button'); b.className='btn-p'; b.style.fontSize='12px'; b.innerText=t;
            b.onclick=()=>toggleTag(t, b); tb.appendChild(b);
        });
    }

    function changeStudent(id) {
        curId = id;
        document.getElementById('stName').innerText = id === 1 ? "1번 홍길동" : "2번 김지수";
        document.getElementById('stChar').innerText = id === 1 ? "🧍" : "🧍‍♀️";
    }

    function openKitchen() { document.getElementById('kitchenModal').style.display='flex'; }
    function closeKitchen() { document.getElementById('kitchenModal').style.display='none'; }

    function pickEmoji(e) {
        if(!s1) { s1=e; document.getElementById('slot1').innerText=e; }
        else { 
            s2=e; document.getElementById('slot2').innerText=e;
            document.getElementById('resSlot').innerText = "🔮"; // 합성 결과 가상 처리
            document.getElementById('metaInput').style.display='block';
        }
    }

    function toggleTag(t, b) {
        if(tags.includes(t)) { tags=tags.filter(i=>i!==t); b.style.background='#ffb6c1'; }
        else if(tags.length<3) { tags.push(t); b.style.background='#ffd700'; }
    }

    function completeEmotion() {
        const res = document.getElementById('resSlot').innerText;
        document.getElementById('cardEmoji').innerText = res;
        document.getElementById('cardTags').innerText = tags.join(' ');
        document.getElementById('cardDiary').innerText = document.getElementById('diaryInput').value;
        
        // Firebase 전송
        database.ref('room/student' + curId).set({
            name: curId === 1 ? "홍길동" : "김지수", num: curId,
            emoji: res, diary: document.getElementById('diaryInput').value,
            tags: tags.join(' '), status: "online"
        }).then(() => { alert("교실 전송 완료!"); closeKitchen(); });
    }
    init();
</script>
</body>
</html>
