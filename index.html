<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>EMOTION MAKER 6-5</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="game-window">
    <div class="window-header">
        <span>6-5 EMOTION KITCHEN</span>
        <div>
            <button class="pixel-btn" onclick="switchStudent(1)">1번 남학생</button>
            <button class="pixel-btn" onclick="switchStudent(2)">2번 여학생</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="left-panel">
            <h3>[ 감정 원소 선택 ]</h3>
            <div class="emoji-category" id="emojiGrid"></div>
            
            <div style="background:#222; color:#ffd700; padding:20px; border-radius:15px; font-size:40px; text-align:center;">
                <span id="s1">?</span> + <span id="s2">?</span> = <span id="sResult">?</span>
            </div>

            <div id="tagArea" style="display:none; margin-top:15px;">
                <strong>태그 선택(최대 3개):</strong>
                <div id="tagList" style="display:flex; flex-wrap:wrap; gap:5px; margin:10px 0;"></div>
                <textarea id="diary" style="width:100%; height:60px;" placeholder="오늘의 마음을 적어주세요."></textarea>
                <button class="pixel-btn" style="width:100%; background:#ffb6c1;" onclick="sendData()">감정 카드 전송하기</button>
            </div>
        </div>

        <div class="right-panel">
            <h3>[ 나의 감정 카드 ]</h3>
            <div class="card-view">
                <div id="charEmoji" class="char-img">🧍</div>
                <h2 id="dispName">1번 학생: 홍길동</h2>
                <div id="dispTags" style="color:blue; font-weight:bold; margin:10px 0;">#감정 #기록</div>
                <div id="dispDiary" style="font-size:15px; color:#555;">마음을 입력하면 카드가 완성됩니다.</div>
            </div>

            <div class="status-box">
                <div class="stat-row">정서적 에너지 <div class="gauge-bg"><div id="b-en" class="gauge-fill" style="background:#ff4757; width:20%;"></div></div></div>
                <div class="stat-row">심리적 안정감 <div class="gauge-bg"><div id="b-re" class="gauge-fill" style="background:#2ed573; width:20%;"></div></div></div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
        authDomain: "secret-quest-class.firebaseapp.com",
        databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/",
        projectId: "secret-quest-class",
        storageBucket: "secret-quest-class.firebasestorage.app",
        messagingSenderId: "397245266210",
        appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentId = 1;
    let s1="", s2="", selectedTags = [];
    const emojis = ["😊","😆","🥰","😎","🥳","😌","☁️","🍵","🌱","🌊","💢","😡","😢","😫","🔥"];
    const tags = ["#행복", "#뿌듯", "#안정", "#편안", "#피곤", "#짜증", "#위로", "#용기"];

    function init() {
        const grid = document.getElementById('emojiGrid');
        emojis.forEach(e => {
            const b = document.createElement('button'); b.className='emoji-btn'; b.innerText=e;
            b.onclick=() => pick(e); grid.appendChild(b);
        });
        const tl = document.getElementById('tagList');
        tags.forEach(t => {
            const b = document.createElement('button'); b.className='pixel-btn'; b.style.fontSize='12px'; b.innerText=t;
            b.onclick=() => toggleTag(t, b); tl.appendChild(b);
        });
    }

    function switchStudent(id) {
        currentId = id;
        document.getElementById('dispName').innerText = id === 1 ? "1번 학생(남)" : "2번 학생(여)";
        document.getElementById('charEmoji').innerText = id === 1 ? "🧍" : "🧍‍♀️";
    }

    function pick(e) {
        if(!s1) { s1=e; document.getElementById('s1').innerText=e; }
        else { 
            s2=e; document.getElementById('s2').innerText=e; 
            document.getElementById('sResult').innerText = "✨";
            document.getElementById('charEmoji').innerText = "🌈";
            document.getElementById('tagArea').style.display='block';
            updateBars(e);
        }
    }

    function toggleTag(t, b) {
        if(selectedTags.includes(t)) { selectedTags = selectedTags.filter(i=>i!==t); b.style.background='white'; }
        else if(selectedTags.length < 3) { selectedTags.push(t); b.style.background='#ffd700'; }
        document.getElementById('dispTags').innerText = selectedTags.join(' ');
    }

    function updateBars(e) {
        let en = 50, re = 50;
        if(["😊","😆","🔥"].includes(e)) { en=90; re=30; }
        if(["😌","🍵","🌱"].includes(e)) { en=30; re=90; }
        document.getElementById('b-en').style.width = en + "%";
        document.getElementById('b-re').style.width = re + "%";
    }

    function sendData() {
        database.ref('room/student' + currentId).set({
            name: currentId === 1 ? "홍길동" : "김지수", num: currentId,
            emoji: document.getElementById('charEmoji').innerText,
            diary: document.getElementById('diary').value,
            tags: selectedTags.join(' '), status: "online"
        }).then(() => { alert("감정 카드가 전송되었습니다!"); location.href="classroom.html"; });
    }
    init();
</script>
</body>
</html>
