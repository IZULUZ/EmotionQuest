<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 관리자</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family:sans-serif; padding:20px; background:#f4f4f4; }
        .section { background:white; padding:20px; margin-bottom:20px; border:1px solid #ddd; }
        .quest-list { list-style:none; padding:0; }
        .quest-item { background:#eee; padding:10px; margin-bottom:5px; display:flex; justify-content:space-between; }
    </style>
</head>
<body>
    <h2>⚙️ 교사 관리 시스템 (PW: 1234)</h2>

    <div class="section">
        <h3>게시판 퀘스트 관리 (기본 3종 포함)</h3>
        <ul id="boardQuests" class="quest-list"></ul>
        <input type="text" id="newQ" placeholder="퀘스트 내용">
        <select id="newT"><option>배려</option><option>존중</option><option>사랑</option></select>
        <button onclick="addBoardQuest()">추가</button>
    </div>

    <div class="section">
        <h3>학생 완료 승인</h3>
        <div id="requests"></div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8", authDomain: "secret-quest-class.firebaseapp.com", databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/", projectId: "secret-quest-class", storageBucket: "secret-quest-class.firebasestorage.app", messagingSenderId: "397245266210", appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    // 초기 기본 퀘스트 세팅 (데이터가 없을 때만)
    db.ref('board/quests').once('value', s => {
        if(!s.exists()) {
            const basic = [
                {title:"친구의 말을 끝까지 들어주기", type:"존중"},
                {title:"우유 상자 정리 도와주기", type:"배려"},
                {title:"자기 자신에게 칭찬 한마디 하기", type:"사랑"}
            ];
            basic.forEach(q => db.ref('board/quests').push(q));
        }
    });

    db.ref('board/quests').on('value', snap => {
        const l = document.getElementById('boardQuests'); l.innerHTML="";
        snap.forEach(c => {
            l.innerHTML += `<li class="quest-item">${c.val().title} [${c.val().type}] <button onclick="delQuest('${c.key}')">삭제</button></li>`;
        });
    });

    db.ref('room/').on('value', snap => {
        const r = document.getElementById('requests'); r.innerHTML="";
        snap.forEach(c => {
            const s = c.val();
            if(s.requestDone) {
                r.innerHTML += `<div>${s.num}번 학생 승인 요청! <button onclick="approve('${s.num}')">승인</button></div>`;
            }
        });
    });

    function addBoardQuest() {
        const t = document.getElementById('newQ').value;
        const ty = document.getElementById('newT').value;
        if(t) db.ref('board/quests').push({title:t, type:ty});
    }
    function delQuest(k) { db.ref(`board/quests/${k}`).remove(); }
    function approve(n) {
        db.ref(`room/student${n}`).once('value', snap => {
            const s = snap.val(); const k = s.requestDone.key;
            db.ref(`room/student${n}/myQuests/${k}`).once('value', qSnap => {
                const q = qSnap.val();
                let cur = s.gems?.[q.type] || 0;
                db.ref(`room/student${n}/gems/${q.type}`).set(cur + 1);
                db.ref(`room/student${n}/requestDone`).remove();
                db.ref(`room/student${n}/myQuests/${k}`).remove();
                alert("보석 지급 완료!");
            });
        });
    }
</script>
</body>
</html>
