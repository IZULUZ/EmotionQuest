<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 감정 관리 센터 - 교사용</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @font-face { font-family: 'DungGeunMo'; src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff'); }
        :root { --pm-dark: #3e2723; --pm-gold: #c5a059; --pm-bg: #fdf5e6; --pm-red: #d32f2f; }
        
        body { margin: 0; background: #1a1a1a; font-family: 'DungGeunMo', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* 메인 윈도우 */
        .pm-window { width: 1100px; height: 750px; background: var(--pm-bg); border: 12px ridge var(--pm-dark); outline: 4px solid var(--pm-gold); display: flex; flex-direction: column; }
        .pm-header { background: linear-gradient(to bottom, #b71c1c, #3e2723); color: var(--pm-gold); padding: 12px; text-align: center; font-size: 24px; border-bottom: 4px double var(--pm-gold); letter-spacing: 2px; }
        
        .admin-layout { display: flex; flex: 1; overflow: hidden; }
        
        /* 교실 모니터링 그리드 */
        .desk-grid { flex: 1; display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 20px; background: #ead7b1; border: 5px inset #3e2723; margin: 15px; overflow-y: auto; }
        
        /* 책상 스타일 */
        .desk { background: #3e2723; border: 3px solid #555; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #777; transition: 0.3s; position: relative; cursor: pointer; }
        .desk.online { background: #fff9eb; border: 3px double var(--pm-gold); color: #333; box-shadow: 3px 3px 10px rgba(0,0,0,0.2); }
        .desk img { width: 45px; margin-bottom: 5px; filter: grayscale(1); }
        .desk.online img { filter: grayscale(0); }
        .desk .gem-count { position: absolute; top: 5px; right: 5px; font-size: 11px; color: var(--pm-red); }

        /* ★중요: 완료 요청 시 깜빡임 애니메이션 */
        .desk.request-active { border: 5px solid var(--pm-red) !important; animation: blink 0.8s infinite; z-index: 10; transform: scale(1.05); }
        @keyframes blink { 50% { border-color: transparent; } }

        /* 우측 사이드바 */
        .admin-side { width: 300px; background: #fff9eb; border-left: 5px double var(--pm-dark); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .pm-btn { background: var(--pm-dark); color: var(--pm-gold); border: 4px outset var(--pm-gold); padding: 10px; cursor: pointer; font-family: inherit; font-size: 14px; }
        .pm-btn:active { border-style: inset; }
        .pm-btn.approve-btn { background: var(--pm-red); color: white; border-color: #ffcdd2; font-weight: bold; }
        
        .log-area { flex: 1; background: white; border: 3px inset #ccc; padding: 10px; font-size: 12px; overflow-y: auto; color: #555; }
        input, textarea { padding: 10px; border: 2px inset #ccc; font-family: inherit; }
    </style>
</head>
<body>

<div class="pm-window">
    <div class="pm-header">6-5 EMOTION & QUEST ADMIN CENTER</div>
    <div class="admin-layout">
        <div class="desk-grid" id="adminGrid">
            </div>

        <div class="admin-side">
            <h3 style="margin:0; text-align:center; color:var(--pm-dark);">QUEST ISSUER</h3>
            <p style="font-size:11px; color:#666; margin:0;">학생들의 게시판에 표시될 공통 미션을 입력하세요.</p>
            <textarea id="globalQInput" rows="3" placeholder="예: 급식 질서 지키기!"></textarea>
            <button class="pm-btn" onclick="issueGlobalQuest()">📣 전체 미션 발송</button>
            
            <hr style="width:100%; border:1px double var(--pm-gold);">
            
            <h3 style="margin:0; text-align:center; color:var(--pm-dark);">ACTIVITY LOG</h3>
            <div class="log-area" id="adminLog">시스템 대기 중...</div>
            
            <button class="pm-btn" style="background:#666;" onclick="location.href='index.html'">🔙 학생 화면으로</button>
        </div>
    </div>
</div>

<script>
    // Firebase 설정 (학생용과 동일)
    const firebaseConfig = {
        apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8",
        authDomain: "secret-quest-class.firebaseapp.com",
        databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/",
        projectId: "secret-quest-class",
        storageBucket: "secret-quest-class.firebasestorage.app",
        messagingSenderId: "397245266210",
        appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 관리자 암호 체크
    const pw = prompt("관리자 암호를 입력하세요.", "");
    if(pw !== "6500") {
        alert("권한이 없습니다.");
        location.href = "index.html";
    }

    // 1~23번 책상 미리 생성
    const grid = document.getElementById('adminGrid');
    for(let i=1; i<=23; i++) {
        let d = document.createElement('div');
        d.className = 'desk';
        d.id = `admin-desk-${i}`;
        d.innerHTML = `No.${i}<br>OFFLINE`;
        grid.appendChild(d);
    }

    // 실시간 데이터 감시 및 UI 업데이트
    db.ref('room/').on('value', snap => {
        const data = snap.val();
        if(!data) return;

        // 모든 책상 초기화 상태 유지 후 온라인 정보 덮어쓰기
        Object.values(data).forEach(s => {
            const desk = document.getElementById(`admin-desk-${s.num}`);
            if(!desk) return;

            // 기본 온라인 상태 표시
            desk.className = 'desk online';
            if(s.requestDone) {
                desk.classList.add('request-active'); // 빨간 깜빡임 추가
            }

            desk.innerHTML = `
                <div class="gem-count">💎${s.gems || 0}</div>
                <img src="${s.emojiImg || ''}" style="display:${s.emojiImg?'block':'none'}">
                <div style="font-weight:bold;">${s.name}</div>
                <div style="font-size:10px; color:var(--pm-gold);">${s.tag || ''}</div>
            `;

            // 책상 클릭 시 액션 (승인 또는 정보 보기)
            desk.onclick = () => {
                if(s.requestDone) {
                    handleApprove(s);
                } else {
                    alert(`[${s.name} 학생 정보]\n\n성찰일기: ${s.diary}\n현재 태그: ${s.tag}\n보유 보석: ${s.gems || 0}개`);
                }
            };
        });
    });

    // 퀘스트 승인 처리 함수
    function handleApprove(student) {
        const req = student.requestDone;
        if(confirm(`[${student.name}] 학생의 승인 요청\n미션: ${req.title}\n\n보석 1개를 지급하고 승인하시겠습니까?`)) {
            // 1. 학생의 퀘스트 목록에서 해당 퀘스트 삭제
            db.ref(`room/student${student.num}/quests/${req.key}`).remove();
            // 2. 승인 요청 데이터 삭제 (깜빡임 멈춤)
            db.ref(`room/student${student.num}/requestDone`).remove();
            // 3. 보석 개수 +1
            db.ref(`room/student${student.num}/gems`).set((student.gems || 0) + 1);
            
            addLog(`${student.name} - '${req.title}' 승인 완료 (💎+1)`);
        }
    }

    // 공통 퀘스트 발송
    function issueGlobalQuest() {
        const title = document.getElementById('globalQInput').value;
        if(!title) return alert("미션 내용을 입력하세요.");
        
        db.ref('globalQuests').push({
            title: title,
            time: Date.now()
        }).then(() => {
            alert("학급 게시판에 미션이 등록되었습니다.");
            document.getElementById('globalQInput').value = "";
            addLog(`새 공통 미션 발급: ${title}`);
        });
    }

    // 로그 기록
    function addLog(msg) {
        const log = document.getElementById('adminLog');
        const now = new Date();
        const timeStr = `${now.getHours()}:${now.getMinutes()}`;
        log.innerHTML = `<div>[${timeStr}] ${msg}</div>` + log.innerHTML;
    }
</script>
</body>
</html>
