<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 관리자</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>
<div class="window" style="width:800px; height:600px;">
    <div class="header">⚙️ 교사 전용 관리 시스템</div>
    <div class="main-content" style="flex-direction:column;">
        <div class="frame" style="flex:1; overflow-y:auto;">
            <h3>🚩 퀘스트 완료 승인 대기 목록</h3>
            <div id="reqList"></div>
        </div>
        <button class="pm-btn" onclick="location.href='classroom.html'">교실로 돌아가기</button>
    </div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyDw773x1yot2uncAMl_gTQ6z6Njhgh1Od8", authDomain: "secret-quest-class.firebaseapp.com", databaseURL: "https://secret-quest-class-default-rtdb.firebaseio.com/", projectId: "secret-quest-class", storageBucket: "secret-quest-class.firebasestorage.app", messagingSenderId: "397245266210", appId: "1:397245266210:web:fde35d6a4dfd6ca7070d7b" };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    db.ref('room/').on('value', snap => {
        const l = document.getElementById('reqList'); l.innerHTML = "";
        snap.forEach(c => {
            const s = c.val();
            if(s.requestDone) {
                l.innerHTML += `<div class="frame" style="margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${s.num}번 학생</b>이 퀘스트를 완료했습니다.</span>
                    <button class="pm-btn" style="width:100px;" onclick="approve('${s.num}')">승인</button>
                </div>`;
            }
        });
    });

    function approve(n) {
        db.ref(`room/student${n}`).once('value', snap => {
            const s = snap.val(); const qKey = s.requestDone.key;
            db.ref(`room/student${n}/myQuests/${qKey}`).once('value', qSnap => {
                const q = qSnap.val();
                let cur = s.gems[q.type] || 0;
                db.ref(`room/student${n}/gems/${q.type}`).set(cur + 1);
                db.ref(`room/student${n}/requestDone`).remove();
                db.ref(`room/student${n}/myQuests/${qKey}`).remove();
                alert(`${n}번 학생 보석 지급 및 승인 완료!`);
            });
        });
    }
</script>
</body>
</html>
