<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 관리자실</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        /* 학생 교실과 동일한 스타일, 기능만 다름 */
        .request-blink { border: 5px solid red !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="pm-window">
        <div class="pm-header">6-5 TEACHER CONTROL CENTER</div>
        <div style="display:flex; flex:1;">
            <div id="deskGrid" class="classroom-grid" style="flex:1;"></div>
            <div class="side" style="width:250px; padding:20px; border-left:4px double #3e2723;">
                <h3>📜 퀘스트 발급</h3>
                <input type="text" id="qInput" style="width:100%" placeholder="미션 내용...">
                <button class="pm-btn" onclick="issueQuest()">발급하기</button>
                <hr>
                <button class="pm-btn" onclick="openAllCards()">전체 감정카드 보기</button>
            </div>
        </div>
    </div>

<script>
    const db = firebase.database();
    let pw = prompt("관리자 암호", "");
    if(pw !== "6500") { alert("접근 거부"); location.href="index.html"; }

    // 데스크 생성 및 실시간 감시
    db.ref('room/').on('value', snap => {
        const grid = document.getElementById('deskGrid'); grid.innerHTML = "";
        snap.forEach(child => {
            const s = child.val();
            let d = document.createElement('div'); d.className='desk online';
            if(s.requestDone) d.classList.add('request-blink');
            d.innerHTML = `${s.num}번 ${s.name}<br>💎${s.gems||0}`;
            d.onclick = () => handleApprove(s);
            grid.appendChild(d);
        });
    });

    function handleApprove(s) {
        if(s.requestDone) {
            if(confirm(`[${s.requestDone.title}] 승인하고 보석을 주시겠습니까?`)) {
                db.ref(`room/student${s.num}/quests/${s.requestDone.key}`).remove();
                db.ref(`room/student${s.num}/requestDone`).remove();
                db.ref(`room/student${s.num}/gems`).set((s.gems || 0) + 1);
            }
        } else {
            alert(`[감정카드]\n성찰: ${s.diary}`);
        }
    }

    function issueQuest() {
        const title = document.getElementById('qInput').value;
        db.ref('globalQuests').push({ title: title });
        alert("교실 게시판에 퀘스트가 등록되었습니다.");
    }
</script>
</body>
</html>
