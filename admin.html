<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>교사용 관리 패널</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>
<body>
<div class="window" style="width:1200px;">
    <div class="header">🛡️ 교사 관리 시스템</div>
    <div style="display:flex; padding:20px; gap:20px; height:85%;">
        <div id="adminGrid" style="flex:2; display:grid; grid-template-columns:repeat(6,1fr); gap:10px; background:#3a2218; padding:15px;"></div>
        
        <div style="flex:1; display:flex; flex-direction:column; gap:15px;">
            <button class="pm-btn" onclick="toggleWall()">🗂️ 감정카드 모아보기</button>
            <div style="background:white; border:4px ridge var(--pm-gold); padding:15px; flex:1; overflow-y:auto;">
                <h4 style="margin:0;">🔔 퀘스트 승인 대기</h4>
                <div id="reqList" style="margin-top:10px; font-size:14px;"></div>
            </div>
            <div style="background:#000; color:var(--pm-gold); padding:15px;">
                <h4 style="margin:0;">🎁 보석 배부</h4>
                <select id="gemType" class="pm-btn" style="width:100%; margin:5px 0;">
                    <option>배려</option><option>존중</option><option>사랑</option>
                </select>
                <button class="pm-btn" style="width:100%;" onclick="giveGemSelected()">선택 학생 지급</button>
            </div>
        </div>
    </div>
</div>

<div id="cardWall" class="modal" style="overflow-y:auto; padding:50px; background:white;">
    <button class="pm-btn" onclick="toggleWall()" style="position:fixed; top:20px; right:20px;">닫기</button>
    <h2>🖼️ 학생 감정카드 모음</h2>
    <div id="wallContent" style="display:grid; grid-template-columns:repeat(4,1fr); gap:20px;"></div>
</div>

<script>
    let selectedSt = null;
    const ag = document.getElementById('adminGrid');
    for(let i=1; i<=23; i++) ag.innerHTML += `<div class="desk" id="ad${i}" onclick="selectSt('${i}')" style="height:100px; cursor:pointer;">${i}</div>`;

    db.ref('room/').on('value', snap => {
        const reqList = document.getElementById('reqList'); reqList.innerHTML = "";
        const wall = document.getElementById('wallContent'); wall.innerHTML = "";
        snap.forEach(c => {
            const s = c.val(); if(s.status==='online') {
                document.getElementById(`ad${s.num}`).className = 'desk on';
                document.getElementById(`ad${s.num}`).innerHTML = `<img src="${s.emojiImg}" width="40"><br>${s.num}번`;
                if(s.reqDone) reqList.innerHTML += `<div>${s.num}번: ${s.quest} <button onclick="approve('${s.num}')">승인</button></div>`;
                wall.innerHTML += `<div style="border:2px solid #3a2218; padding:10px; background:#fffcf5;"><img src="${s.emojiImg}" width="60"><br><strong>${s.num}번</strong><br>${s.tags.join(" ")}<br><small>${s.diary}</small></div>`;
            }
        });
    });

    function selectSt(n) { selectedSt = n; alert(n + "번 학생을 선택했습니다."); }
    function approve(n) { db.ref(`room/student${n}/gems/배려`).transaction(v=>(v||0)+1); db.ref(`room/student${n}/reqDone`).remove(); }
    function giveGemSelected() { if(selectedSt) approve(selectedSt); }
    function toggleWall() { const w = document.getElementById('cardWall'); w.style.display = w.style.display==='block' ? 'none' : 'block'; }
</script>
</body>
</html>
