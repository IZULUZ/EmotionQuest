<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>6-5 관리자실</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        /* 기본 스타일 classroom.html과 동일하게 유지하되 관리 기능 추가 */
        .blink { border: 5px solid red !important; animation: b 1s infinite; }
        @keyframes b { 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="pm-window">
        <div class="pm-header">6-5 TEACHER CONTROL CENTER</div>
        <div style="display:flex; flex:1;">
            <div id="deskGrid" class="classroom-grid" style="flex:1;"></div>
            <div style="width:250px; padding:15px; border-left:4px double #3e2723;">
                <h3>📜 전체 미션 발송</h3>
                <input type="text" id="qIn" style="width:100%" placeholder="미션 내용...">
                <button class="pm-btn" style="width:100%" onclick="send()">발송</button>
            </div>
        </div>
    </div>
<script>
    const db = firebase.database();
    db.ref('room/').on('value', snap => {
        const grid = document.getElementById('deskGrid'); grid.innerHTML = "";
        snap.forEach(child => {
            const s = child.val();
            let d = document.createElement('div'); d.className = 'desk online';
            if(s.requestDone) d.classList.add('blink');
            d.innerHTML = `<img src="${s.emojiImg}">No.${s.num} ${s.name}<br>💎${s.gems||0}`;
            d.onclick = () => {
                if(s.requestDone) {
                    if(confirm(`[${s.requestDone.title}] 승인하고 보석을 주시겠습니까?`)) {
                        db.ref(`room/student${s.num}/quests/${s.requestDone.key}`).remove();
                        db.ref(`room/student${s.num}/requestDone`).remove();
                        db.ref(`room/student${s.num}/gems`).set((s.gems || 0) + 1);
                    }
                } else { alert(`조언 태그: ${s.tag}\n성찰: ${s.diary}`); }
            };
            grid.appendChild(d);
        });
    });
    function send() {
        db.ref('globalQuests').push({ title: document.getElementById('qIn').value });
        alert("발송 완료");
    }
</script>
</body>
</html>
